# Auto-imported from flatpak-tracker issue #304 — do not edit manually
app-id: org.altlinux.Tuner
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: tuner
add-extensions:
  org.altlinux.Tuner.Plugin:
    directory: extensions
    merge-dirs: lib/tuner/plugins;share
    subdirectories: true
    no-autodownload: true
    autodelete: true
finish-args:
- --share=ipc
- --socket=fallback-x11
- --socket=wayland
- --talk-name=ca.desrt.dconf
- --filesystem=xdg-run/dconf
- --filesystem=xdg-config/dconf
- --filesystem=host-os:ro
- --env=GIO_EXTRA_MODULES=/app/lib/gio/modules
- --device=dri
modules:
- name: dconf
  buildsystem: meson
  config-opts:
  - -Dbash_completion=false
  - -Dman=false
  cleanup:
  - /include
  - /lib/pkgconfig
  - /libexec
  - /share/dbus-1
  sources:
  - type: archive
    url: https://download.gnome.org/sources/dconf/0.40/dconf-0.40.0.tar.xz
    sha256: cf7f22a4c9200421d8d3325c5c1b8b93a36843650c9f95d6451e20f0bcb24533
  - type: patch
    path: dconf-override.patch
- name: blueprint-compiler
  cleanup:
  - '*'
  buildsystem: meson
  sources:
  - type: git
    url: https://gitlab.gnome.org/GNOME/blueprint-compiler
    tag: v0.18.0
- name: libpeas
  buildsystem: meson
  config-opts:
  - -Dlua51=false
  - -Dpython3=true
  - -Dvapi=true
  - -Dgjs=false  # mozjs-128 not available in org.gnome.Platform/49
  sources:
  - type: git
    url: https://gitlab.gnome.org/GNOME/libpeas.git
    tag: 2.0.7
- name: tuner
  builddir: true
  buildsystem: meson
  sources:
  - type: git
    url: https://altlinux.space/alt-gnome/Tuner.git
    tag: 0.5.0
    commit: 81f377d10e9af3bc867bc8c7812847d00a99985b
  post-install:
  - install -d /app/extensions
- name: gnome-desktop
  buildsystem: meson
  cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  config-opts:
  - -Ddesktop_docs=false
  - -Dlegacy_library=false
  - -Ddebug_tools=false
  - -Dudev=disabled
  sources:
  - type: git
    url: https://gitlab.gnome.org/GNOME/gnome-desktop.git
    tag: '44.3'
    commit: f1aba7d1ff0bd1a6bb35b03d77f56c3cc82a6024
- name: tuner-tweaks
  builddir: true
  buildsystem: meson
  cleanup:
  - /share/metainfo
  sources:
  - type: git
    url: https://altlinux.space/alt-gnome/TunerTweaks.git
    tag: 0.5.0
    commit: 3ea544fd21765ef9437aca201622df7cfc976f7a
x-version: '0.5.0'
x-skip-launch-check: true
x-skip-chunkah: true
x-skip-install-test: true
x-arches:
- x86_64
