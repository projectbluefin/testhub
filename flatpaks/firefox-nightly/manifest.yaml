        dest-filename: 32.png
      - type: file
        url: https://hg-edge.mozilla.org/mozilla-central/raw-file/2e8859b2c1f8beec665aab057c56b8be50168f66/browser/branding/nightly/default48.png
        sha256: f63b83a8e0dc92e1cd0be34313a7f512a8771ff6804f6f5d4a1199ef4dd48b30
