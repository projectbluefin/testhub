app-id: org.mozilla.firefox.nightly
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
base: org.mozilla.firefox.BaseApp
base-version: "24.08"
default-branch: nightly
x-version: "150.0a1"
x-chunkah-max-layers: "16"
x-container-image: "ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08"
command: firefox

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=pcsc
  - --socket=cups
  - --device=all
  - --allow=devel  # Required: Firefox Nightly uses developer-only kernel features (performance counters, etc.)
  - --filesystem=xdg-config/gtk-3.0:ro
  - --filesystem=xdg-download
  - --filesystem=/run/.heim_org.h5l.kcm-socket
  - --filesystem=xdg-run/speech-dispatcher:ro
  - --persist=.mozilla
  - --own-name=org.mozilla.firefox_beta.*
  - --own-name=org.mozilla.firefox.*
  - --own-name=org.mpris.MediaPlayer2.firefox.*
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.a11y.Bus
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.mpris.MediaPlayer2.firefox.*
  - --system-talk-name=org.freedesktop.NetworkManager
  - --env=DICPATH=/usr/share/hunspell

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: "24.08"
    add-ld-path: .
  org.mozilla.firefox.Locale:
    directory: share/runtime/langpack
    version: nightly
    subdirectories: true
    no-autodownload: true
  org.mozilla.firefox.systemconfig:
    directory: etc/firefox
    version: nightly
    no-autodownload: true

modules:
  - name: firefox
    buildsystem: simple
    build-commands:
      - install -d /app/lib/firefox
      - cp -r firefox/. /app/lib/firefox/
      - install -D -m 755 firefox.sh /app/bin/firefox
      - install -D -m 644 org.mozilla.firefox.nightly.desktop /app/share/applications/org.mozilla.firefox.nightly.desktop
      - install -D -m 644 org.mozilla.firefox.nightly.appdata.xml /app/share/metainfo/org.mozilla.firefox.nightly.appdata.xml
      - install -D -m 644 icons/16.png /app/share/icons/hicolor/16x16/apps/org.mozilla.firefox.nightly.png
      - install -D -m 644 icons/32.png /app/share/icons/hicolor/32x32/apps/org.mozilla.firefox.nightly.png
      - install -D -m 644 icons/48.png /app/share/icons/hicolor/48x48/apps/org.mozilla.firefox.nightly.png
      - install -D -m 644 icons/64.png /app/share/icons/hicolor/64x64/apps/org.mozilla.firefox.nightly.png
      - install -D -m 644 icons/128.png /app/share/icons/hicolor/128x128/apps/org.mozilla.firefox.nightly.png
      - install -D -m 644 icons/256.png /app/share/icons/hicolor/256x256/apps/org.mozilla.firefox.nightly.png
      - install -D -m 644 icons/symbolic.svg /app/share/icons/hicolor/symbolic/apps/org.mozilla.firefox.nightly-symbolic.svg
    cleanup-commands:
      - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg
      - mkdir -p ${FLATPAK_DEST}/etc/firefox
      - mkdir -p ${FLATPAK_DEST}/share/runtime/langpack
    sources:
      - type: archive
        url: https://ftp.mozilla.org/pub/firefox/nightly/latest-mozilla-central/firefox-150.0a1.en-US.linux-x86_64.tar.xz
        sha256: 229dd187feb436b378ff4134aa60a967f341d5e65a7e7d4f774fb1b25d87f4cf
        strip-components: 0
        only-arches:
          - x86_64
      - type: archive
        url: https://ftp.mozilla.org/pub/firefox/nightly/latest-mozilla-central/firefox-150.0a1.en-US.linux-aarch64.tar.xz
        sha256: f39a14e7257c494e458b206289e3091ead1c28485115e60554320699ebb9bad2
        strip-components: 0
        only-arches:
          - aarch64
      - type: script
        dest-filename: firefox.sh
        commands:
          - export TMPDIR=$XDG_CACHE_HOME/tmp
          - exec /app/lib/firefox/firefox --name org.mozilla.firefox.nightly "$@"
      - type: file
        path: org.mozilla.firefox.nightly.desktop
      - type: file
        path: org.mozilla.firefox.nightly.appdata.xml
      # Icons pinned to revision 2e8859b2c1f8beec665aab057c56b8be50168f66 (2026-03-11).
      # Update the revision hash and sha256 values when bumping x-version.
      - type: file
        url: https://hg-edge.mozilla.org/mozilla-central/raw-file/2e8859b2c1f8beec665aab057c56b8be50168f66/browser/branding/nightly/default16.png
        sha256: 28a8bac75a9dec5069d4a3928ac4664d351d32b911a5f0e57201ba0118bef35e
        dest: icons
        dest-filename: 16.png
      - type: file
