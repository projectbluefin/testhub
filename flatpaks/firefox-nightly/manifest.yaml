      - type: file
        url: https://hg-edge.mozilla.org/mozilla-central/raw-file/2e8859b2c1f8beec665aab057c56b8be50168f66/browser/branding/nightly/default128.png
        sha256: 4c67676caa243775f91f6b4a5d2bcf8b106b7c7556c154da29481e723a804d5d
