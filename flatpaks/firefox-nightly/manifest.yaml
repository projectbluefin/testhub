app-id: org.mozilla.firefox
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
base: org.mozilla.firefox.BaseApp
base-version: "24.08"
default-branch: nightly
x-version: "150.0a1"
x-chunkah-max-layers: "16"
x-container-image: "ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08"
command: firefox

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=pcsc
  - --socket=cups
  - --device=all
  - --allow=devel  # Required: Firefox Nightly uses developer-only kernel features (performance counters, etc.)
  - --filesystem=xdg-config/gtk-3.0:ro
  - --filesystem=xdg-download
  - --filesystem=/run/.heim_org.h5l.kcm-socket
  - --filesystem=xdg-run/speech-dispatcher:ro
  - --persist=.mozilla
  - --own-name=org.mozilla.firefox_beta.*
  - --own-name=org.mozilla.firefox.*
  - --own-name=org.mpris.MediaPlayer2.firefox.*
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.a11y.Bus
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.mpris.MediaPlayer2.firefox.*
  - --system-talk-name=org.freedesktop.NetworkManager
  - --env=DICPATH=/usr/share/hunspell

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: "24.08"
    add-ld-path: .
  org.mozilla.firefox.Locale:
    directory: share/runtime/langpack
    version: nightly
    subdirectories: true
    no-autodownload: true
  org.mozilla.firefox.systemconfig:
    directory: etc/firefox
    version: nightly
    no-autodownload: true

modules:
  - name: firefox
    buildsystem: simple
    build-commands:
      - install -d /app/lib/firefox
      - cp -r firefox/. /app/lib/firefox/
      - install -D -m 755 firefox.sh /app/bin/firefox
      - install -D -m 644 org.mozilla.firefox.desktop /app/share/applications/org.mozilla.firefox.desktop
      - install -D -m 644 org.mozilla.firefox.appdata.xml /app/share/metainfo/org.mozilla.firefox.appdata.xml
      - install -D -m 644 icons/16.png /app/share/icons/hicolor/16x16/apps/org.mozilla.firefox.png
      - install -D -m 644 icons/32.png /app/share/icons/hicolor/32x32/apps/org.mozilla.firefox.png
      - install -D -m 644 icons/48.png /app/share/icons/hicolor/48x48/apps/org.mozilla.firefox.png
      - install -D -m 644 icons/64.png /app/share/icons/hicolor/64x64/apps/org.mozilla.firefox.png
      - install -D -m 644 icons/128.png /app/share/icons/hicolor/128x128/apps/org.mozilla.firefox.png
      - install -D -m 644 icons/256.png /app/share/icons/hicolor/256x256/apps/org.mozilla.firefox.png
      - install -D -m 644 icons/symbolic.svg /app/share/icons/hicolor/symbolic/apps/org.mozilla.firefox-symbolic.svg
    cleanup-commands:
      - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg
      - mkdir -p ${FLATPAK_DEST}/etc/firefox
      - mkdir -p ${FLATPAK_DEST}/share/runtime/langpack
    sources:
      - type: archive
        url: https://download-installer.cdn.mozilla.net/pub/firefox/nightly/latest-mozilla-central/firefox-150.0a1.en-US.linux-x86_64.tar.xz
        sha256: b2d5a9c72652e46e693a511f392f3b697de96f71c4b21ad4dd3febce0c87fcf8
        strip-components: 0
        only-arches:
          - x86_64
      - type: archive
        url: https://download-installer.cdn.mozilla.net/pub/firefox/nightly/latest-mozilla-central/firefox-150.0a1.en-US.linux-aarch64.tar.xz
        sha256: 9672e3676b91523b7783b07d6679e95a140a4a05ce9ba3cc9d9b4d90a5c7acaf
        strip-components: 0
        only-arches:
          - aarch64
      - type: script
        dest-filename: firefox.sh
        commands:
          - export TMPDIR=$XDG_CACHE_HOME/tmp
          - exec /app/lib/firefox/firefox --name org.mozilla.firefox "$@"
      - type: file
        path: org.mozilla.firefox.desktop
      - type: file
        path: org.mozilla.firefox.appdata.xml
      # Icons pinned to revision b665f8e02b0c8c7189635bd4b2ca356b79b5a5c3 (2026-03-11).
      # Update the revision hash and sha256 values when bumping x-version.
      - type: file
        url: https://hg-edge.mozilla.org/mozilla-central/raw-file/b665f8e02b0c8c7189635bd4b2ca356b79b5a5c3/browser/branding/nightly/default16.png
        sha256: f3bd8854cccae6755bef8713fa943eb95c28e6ba9832b2c3be4d82506424ce7a
