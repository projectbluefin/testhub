app-id: org.mozilla.thunderbird.nightly
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
default-branch: nightly
x-version: "150.0a1"
x-arches:
  - x86_64
x-chunkah-max-layers: "16"
x-container-image: "ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08"
command: thunderbird

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=pcsc
  - --socket=cups
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-run/speech-dispatcher:ro
  - --persist=.thunderbird-nightly
  - --own-name=org.mozilla.thunderbird.nightly.*
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.a11y.Bus
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --system-talk-name=org.freedesktop.NetworkManager
  - --env=DICPATH=/usr/share/hunspell

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: "24.08"
    add-ld-path: .
  org.mozilla.thunderbird.nightly.Locale:
    directory: share/runtime/langpack
    version: nightly
    subdirectories: true
    no-autodownload: true

modules:
  - name: thunderbird
    buildsystem: simple
    build-commands:
      - install -d /app/lib/thunderbird
      - cp -r thunderbird/. /app/lib/thunderbird/
      - install -D -m 755 thunderbird.sh /app/bin/thunderbird
      - install -D -m 644 org.mozilla.thunderbird.nightly.desktop /app/share/applications/org.mozilla.thunderbird.nightly.desktop
      - install -D -m 644 org.mozilla.thunderbird.nightly.metainfo.xml /app/share/metainfo/org.mozilla.thunderbird.nightly.metainfo.xml
      - install -D -m 644 icons/16.png /app/share/icons/hicolor/16x16/apps/org.mozilla.thunderbird.nightly.png
      - install -D -m 644 icons/32.png /app/share/icons/hicolor/32x32/apps/org.mozilla.thunderbird.nightly.png
      - install -D -m 644 icons/48.png /app/share/icons/hicolor/48x48/apps/org.mozilla.thunderbird.nightly.png
      - install -D -m 644 icons/64.png /app/share/icons/hicolor/64x64/apps/org.mozilla.thunderbird.nightly.png
      - install -D -m 644 icons/128.png /app/share/icons/hicolor/128x128/apps/org.mozilla.thunderbird.nightly.png
      - install -D -m 644 icons/256.png /app/share/icons/hicolor/256x256/apps/org.mozilla.thunderbird.nightly.png
      - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg
      - mkdir -p ${FLATPAK_DEST}/share/runtime/langpack
    sources:
      - type: archive
        url: https://download-installer.cdn.mozilla.net/pub/thunderbird/nightly/latest-comm-central/thunderbird-150.0a1.en-US.linux-x86_64.tar.xz
        sha256: 669ef08bbc148c7c58d6f7e646cdb98dfbf4d931fe509c9a197bf4d7fa787f4e
        strip-components: 0
        only-arches:
          - x86_64
      - type: script
        dest-filename: thunderbird.sh
        commands:
          - export TMPDIR=$XDG_CACHE_HOME/tmp
          - exec /app/lib/thunderbird/thunderbird --name org.mozilla.thunderbird.nightly "$@"
      - type: file
        path: org.mozilla.thunderbird.nightly.desktop
      - type: file
        path: org.mozilla.thunderbird.nightly.metainfo.xml
      # Icons pinned to comm-central revision 0a9b4084679aa2d291ec4ea69dccac4219acb705 (2026-03-11).
      # Update the revision hash and sha256 values when bumping x-version.
      - type: file
        url: https://hg-edge.mozilla.org/comm-central/raw-file/0a9b4084679aa2d291ec4ea69dccac4219acb705/mail/branding/nightly/default16.png
        sha256: 63d8287e58bbc78b5548eedc47778f2212813b9785aea4ccf5ec4329a31bc285
        dest: icons
        dest-filename: 16.png
      - type: file
        url: https://hg-edge.mozilla.org/comm-central/raw-file/0a9b4084679aa2d291ec4ea69dccac4219acb705/mail/branding/nightly/default32.png
        sha256: 3eecee68cfa354807919b4b6d98d56209415809630d02076229d1ae622bcf0f9
