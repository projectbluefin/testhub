app-id: com.mitchellh.ghostty
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
default-branch: stable
command: ghostty
finish-args:
  - --device=all  # Required: GPU access (Vulkan/Metal) and PTY device access for terminal
  # Windowing
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Only ghostty's own config dir needed
  - --filesystem=xdg-config/ghostty:ro
  # So we can escape the sandbox
  - --talk-name=org.freedesktop.Flatpak
cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/pkgconfig
  - /share/vala
  - "*.la"
  - "*.a"
  - "*.so"

modules:
  - dependencies.yml

  - name: ghostty
    buildsystem: simple
    build-options:
      append-path: /app/zig
    build-commands:
      # 'zig build install' installs binary, desktop file, and icons (hicolor) to --prefix /app
      - zig build
        -Doptimize=ReleaseFast
        -Dcpu=baseline
        -Dflatpak=true
        -Dstrip=false
        -fno-sys=oniguruma
        --prefix /app
        --search-prefix /app
        --system $PWD/vendor/p
      - install -Dm644 /run/build/com.mitchellh.ghostty/com.mitchellh.ghostty.metainfo.xml /app/share/metainfo/com.mitchellh.ghostty.metainfo.xml
    sources:
      - type: archive
        x-version: "1.3.0"
        url: https://github.com/ghostty-org/ghostty/archive/refs/tags/v1.3.0.tar.gz
        sha256: 3d05cbdb712ec19ecdc720a2757a09ebf79aaa8d90ae2ae5c0ddd5536ef31be6
        strip-components: 1

      - zig-packages.json

      - type: file
        path: com.mitchellh.ghostty.metainfo.xml
