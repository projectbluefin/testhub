name: Build Flatpak OCI
run-name: "Build ${{ inputs.app || 'flatpak(s)' }} OCI (${{ github.ref_name }})"

on:
  push:
    paths:
      - 'flatpaks/**'
    branches: [main]
  pull_request:
    paths:
      - 'flatpaks/**'
  merge_group:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build (directory name under flatpaks/)'
        required: false
        default: ''

concurrency:
  # Scope cancellation to the same package on the same ref.
  # workflow_dispatch with app=X: cancels a prior in-progress run for the same app.
  # push: uses github.sha so each commit is independent — no cross-package cancellation
  # (the triggered app isn't known at workflow level for push events).
  group: build-${{ github.ref }}-${{ inputs.app || github.sha }}
  cancel-in-progress: true

# Top-level: deny all. Each job declares only what it needs.
permissions: {}

jobs:

  # ── Detect which apps changed ──────────────────────────────────────────────
  detect:
    runs-on: ubuntu-24.04
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: detect
        run: |
          if [[ -n "${{ inputs.app }}" ]]; then
            echo 'apps=["${{ inputs.app }}"]' >> "$GITHUB_OUTPUT"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            APPS=$(git diff --name-only HEAD~1 HEAD -- 'flatpaks/' \
              | cut -d/ -f2 | sort -u \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          else
            # First commit or shallow clone — treat all flatpak dirs as changed
            APPS=$(ls -d flatpaks/*/ 2>/dev/null \
              | xargs -I{} basename {} \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build flatpak inside gnome-49 container ────────────────────────────────
  build:
    needs: detect
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    # SOURCE_DATE_EPOCH=0: normalises tar timestamps so OCI blob hashes are deterministic
    # across identical-content builds. build-bundle reads this env directly.
    env:
      SOURCE_DATE_EPOCH: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yq
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          wget "https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_${ARCH}" \
            -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq

      - name: Detect build path and arch support
        id: detect-path
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            echo "mode=bundle-repack" >> "$GITHUB_OUTPUT"
            # Check arches field: if set, skip unsupported arches
            ARCHES=$(yq '.arches // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} on ${{ matrix.arch }} (not in arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            echo "mode=flatpak-builder" >> "$GITHUB_OUTPUT"
            # Check x-arches field for manifest.yaml apps that are arch-restricted
            ARCHES=$(yq '.x-arches // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} on ${{ matrix.arch }} (not in x-arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          else
            echo "ERROR: no manifest.yaml or release.yaml in flatpaks/${{ matrix.app }}/" >&2
            exit 1
          fi

      # ── flatpak-builder path (e.g. ghostty) ──────────────────────────────
      # The v6 action:
      #   - runs flatpak-builder with --ccache --disable-rofiles-fuse --force-clean
      #   - caches .flatpak-builder/ via actions/cache
      #   - cache key: flatpak-builder-${arch}-${manifestHash:0:20}
      #   - fallback restore key: flatpak-builder-${arch}  (ccache reuse on manifest change)
      #   - writes OSTree repo to ./repo  (hardcoded localRepoName — NOT .ostree-repo)
      #   - build-bundle: false → skips bundle step; we export OCI ourselves
      #   - upload-artifact: false → we upload ourselves (correct artifact name per arch)
      - name: Read manifest branch (flatpak-builder path)
        id: manifest-meta
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          BRANCH=$(python3 -c "import yaml,sys; d=yaml.safe_load(open(sys.argv[1])); print(d.get('default-branch','stable'))" "flatpaks/${{ matrix.app }}/manifest.yaml")
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Validate metainfo XML
        if: steps.detect-path.outputs.skip != 'true'
        run: |
          METAINFO=$(find flatpaks/${{ matrix.app }} -name "*.metainfo.xml" | head -1)
          if [ -n "${METAINFO}" ]; then
            echo "==> Validating ${METAINFO}"
            appstreamcli validate --no-net "${METAINFO}" || true
          else
            echo "==> No metainfo XML found for ${{ matrix.app }} — skipping validation"
          fi

      - name: Lint Flatpak manifest
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          # flatpak-builder-lint is available directly in the gnome-49 container at /app/bin/flatpak-builder-lint
          # Runs before the build to catch manifest issues early. Fails the job on errors.
          EXCEPTIONS_FILE="flatpaks/${{ matrix.app }}/exceptions.json"
          if [ -f "${EXCEPTIONS_FILE}" ]; then
            flatpak-builder-lint --exceptions --user-exceptions "${EXCEPTIONS_FILE}" manifest "flatpaks/${{ matrix.app }}/manifest.yaml"
          else
            flatpak-builder-lint manifest "flatpaks/${{ matrix.app }}/manifest.yaml"
          fi

      - name: Build with flatpak-builder (cached)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        uses: flatpak/flatpak-github-actions/flatpak-builder@92ae9851ad316786193b1fd3f40c4b51eb5cb101 # v6
        with:
          manifest-path: flatpaks/${{ matrix.app }}/manifest.yaml
          arch: ${{ matrix.arch }}
          build-bundle: false
          upload-artifact: false
          cache: true
          cache-key: flatpak-${{ matrix.app }}-${{ matrix.arch }}-${{ hashFiles(format('flatpaks/{0}/manifest.yaml', matrix.app)) }}
          branch: ${{ steps.manifest-meta.outputs.branch }}

      - name: Export OCI bundle (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          APP_ID=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('flatpaks/${{ matrix.app }}/manifest.yaml')); print(d['app-id'])")
          [[ -n "${APP_ID}" && "${APP_ID}" != "null" ]] || { echo "ERROR: could not determine app-id" >&2; exit 1; }
          BRANCH="${{ steps.manifest-meta.outputs.branch }}"
          echo "==> Exporting OCI for ${APP_ID} (arch: ${{ matrix.arch }}, branch: ${BRANCH})"
          # OSTree repo is at ./repo (action hardcodes localRepoName='repo')
          # NAME = app-id only (not a full ref path); BRANCH from manifest default-branch; --arch sets target arch
          # Do NOT pass --override-source-date-epoch — that flag belongs to flatpak-builder only
          # SOURCE_DATE_EPOCH=0 env (set at job level) is sufficient for build-bundle
          flatpak build-bundle --oci --arch="${{ matrix.arch }}" repo "${{ matrix.app }}.oci" "${APP_ID}" "${BRANCH}"

      # ── Bundle repack path (e.g. goose) ──────────────────────────────────
      # Downloads upstream .flatpak, verifies sha256, imports into OSTree, exports OCI.
      # No flatpak-builder invocation — upstream build is trusted as-is.
      - name: Download and verify upstream bundle
        if: steps.detect-path.outputs.mode == 'bundle-repack' && steps.detect-path.outputs.skip != 'true'
        run: |
          DESC="flatpaks/${{ matrix.app }}/release.yaml"
          APP_ID=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['app-id'])")
          VERSION=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['version'])")
          URL=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['url'])")
          EXPECTED_SHA=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['sha256'])")
          [[ -n "${APP_ID}" && "${APP_ID}" != "null" \
          && -n "${VERSION}" && "${VERSION}" != "null" \
          && -n "${URL}" && "${URL}" != "null" \
          && -n "${EXPECTED_SHA}" && "${EXPECTED_SHA}" != "null" ]] \
            || { echo "ERROR: release.yaml missing required fields" >&2; exit 1; }
          echo "APP_ID=${APP_ID}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "UPSTREAM_URL=${URL}" >> "$GITHUB_ENV"
          BUNDLE_FILE="/tmp/${{ matrix.app }}-${VERSION}.flatpak"
          echo "BUNDLE_FILE=${BUNDLE_FILE}" >> "$GITHUB_ENV"
          echo "==> Downloading ${URL}"
          curl -fsSL -o "${BUNDLE_FILE}" "${URL}"
          ACTUAL_SHA=$(sha256sum "${BUNDLE_FILE}" | cut -d' ' -f1)
          if [[ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "ERROR: sha256 mismatch" >&2
            echo "  expected: ${EXPECTED_SHA}" >&2
            echo "  actual:   ${ACTUAL_SHA}" >&2
            exit 1
          fi
          echo "==> sha256 OK: ${ACTUAL_SHA}"

      - name: Import bundle and export OCI (bundle-repack path)
        if: steps.detect-path.outputs.mode == 'bundle-repack' && steps.detect-path.outputs.skip != 'true'
        run: |
          ARCH="${{ matrix.arch }}"
          REF="app/${APP_ID}/${ARCH}/stable"
          ostree init --mode=archive-z2 --repo=repo
          echo "==> Importing ${BUNDLE_FILE} → OSTree ref ${REF}"
          # --ref: override embedded ref to match our standard naming
          flatpak build-import-bundle --ref="${REF}" repo "${BUNDLE_FILE}"
          echo "==> Exporting OCI bundle"
          flatpak build-bundle --oci --arch="${ARCH}" repo "${{ matrix.app }}.oci" "${APP_ID}" stable

      - name: Upload OCI artifact
        if: steps.detect-path.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci/
          retention-days: 1

  # ── Build gate (required check for merge queue) ───────────────────────────
  # Single stable job name that requires all build matrix entries to pass.
  # This is what the branch ruleset requires as a status check.
  build-complete:
    needs: [detect, build]
    if: always() && needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "ERROR: build matrix did not fully succeed (result: ${{ needs.build.result }})" >&2
            exit 1
          fi
          echo "==> All build jobs passed"

  # ── Push OCI to ghcr.io with zstd:chunked ─────────────────────────────────
  push:
    needs: [detect, build]
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != '' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v9
        with:
          extra-squeeze: "true"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check arch support
        id: arch-check
        run: |
          # Mirror the arch-exclusion logic from the build job.
          # release.yaml apps: check arches field.
          # manifest.yaml apps: check x-arches field.
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            ARCHES=$(yq '.arches // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} push on ${{ matrix.arch }} (not in arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            ARCHES=$(yq '.x-arches // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} push on ${{ matrix.arch }} (not in x-arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

      - name: Read release metadata
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          # GITHUB_ENV is job-scoped — re-derive version here from source descriptors.
          # Bundle-repack: read version + url from release.yaml.
          # Flatpak-builder: read x-version from manifest.yaml (x- prefix is ignored by flatpak-builder).
          # If neither supplies a version, only :latest is pushed (ghostty tip, etc.).
          DESC="flatpaks/${{ matrix.app }}/release.yaml"
          MANIFEST="flatpaks/${{ matrix.app }}/manifest.yaml"
          if [[ -f "${DESC}" ]]; then
            VERSION=$(yq '.version' "${DESC}")
            URL=$(yq '.url' "${DESC}")
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
            echo "UPSTREAM_URL=${URL}" >> "$GITHUB_ENV"
            echo "==> Bundle-repack: VERSION=${VERSION}"
          elif [[ -f "${MANIFEST}" ]]; then
            X_VERSION=$(yq '.x-version // ""' "${MANIFEST}")
            if [[ -n "${X_VERSION}" && "${X_VERSION}" != "null" ]]; then
              echo "VERSION=${X_VERSION}" >> "$GITHUB_ENV"
              echo "==> Flatpak-builder: VERSION=${X_VERSION}"
            else
              echo "==> Flatpak-builder: no x-version in manifest.yaml — only :latest will be pushed"
            fi
          fi

      - name: Download OCI artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci

      - name: Restore layer history cache
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/layer-history.txt
          key: layer-history-${{ matrix.app }}-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: layer-history-${{ matrix.app }}-${{ matrix.arch }}-

      - name: Split layers with chunkah
        if: steps.arch-check.outputs.skip != 'true'
        env:
          APP: ${{ matrix.app }}
          CHUNKAH_SPLITTER: https://github.com/coreos/chunkah/releases/download/v0.3.0/Containerfile.splitter
        run: |
          INPUT="localhost/${APP}:input"
          LABELED="localhost/${APP}:labeled"
          CHUNKED="localhost/${APP}:chunked"

          # Pull OCI dir into the shared podman/buildah store and tag for stable reference.
          IMAGE_ID=$(podman pull --quiet "oci:./${APP}.oci")
          podman tag "${IMAGE_ID}" "${INPUT}"

          # Apply OCI labels via buildah from→config→commit (buildah config requires a
          # working container, not an image — create one, configure it, then commit back).
          CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CTR=$(buildah from "${INPUT}")
          buildah config \
            --label "org.opencontainers.image.version=${VERSION:-}" \
            --label "org.opencontainers.image.source=${UPSTREAM_URL:-}" \
            --label "org.opencontainers.image.created=${CREATED}" \
            --label "org.opencontainers.image.vendor=${{ github.repository_owner }}" \
            --label "org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            "${CTR}"
          # title/description/license only exist in release.yaml (bundle-repack path)
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            TITLE=$(yq '.title // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            DESCRIPTION=$(yq '.description // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            LICENSE=$(yq '.license // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${TITLE}" && "${TITLE}" != "null" ]] && buildah config --label "org.opencontainers.image.title=${TITLE}" "${CTR}" || true
            [[ -n "${DESCRIPTION}" && "${DESCRIPTION}" != "null" ]] && buildah config --label "org.opencontainers.image.description=${DESCRIPTION}" "${CTR}" || true
            [[ -n "${LICENSE}" && "${LICENSE}" != "null" ]] && buildah config --label "org.opencontainers.image.licenses=${LICENSE}" "${CTR}" || true
          fi
          buildah commit "${CTR}" "${LABELED}"
          buildah rm "${CTR}"
          echo "==> OCI labels applied"

          # Per-app max-layers tuning: read from x-chunkah-max-layers (manifest.yaml)
          # or chunkah-max-layers (release.yaml), defaulting to 16.
          if [[ -f "flatpaks/${APP}/release.yaml" ]]; then
            MAX_LAYERS=$(yq '.["chunkah-max-layers"] // 16' "flatpaks/${APP}/release.yaml")
          else
            MAX_LAYERS=$(yq '.["x-chunkah-max-layers"] // 16' "flatpaks/${APP}/manifest.yaml")
          fi
          echo "==> MAX_LAYERS=${MAX_LAYERS}"

          # podman inspect produces the array format chunkah's parse_config accepts.
          # Must use LABELED (has labels) not INPUT (pre-label image).
          export CHUNKAH_CONFIG_STR
          CHUNKAH_CONFIG_STR=$(podman inspect "${LABELED}" | jq -c '.[0]')

          # buildah build --from replaces podman run --mount=type=image (requires
          # capabilities unavailable on non-privileged ubuntu-24.04 runner).
          # buildah < v1.44 requires -v and --security-opt for the bind mount in
          # Containerfile.splitter to work correctly.
          echo "==> Running chunkah via buildah build"
          buildah build \
            --skip-unused-stages=false \
            --from "${LABELED}" \
            -t "${CHUNKED}" \
            -v "$(pwd):/run/src" \
            --security-opt=label=disable \
            --build-arg CHUNKAH_CONFIG_STR \
            --build-arg "CHUNKAH_ARGS=--max-layers ${MAX_LAYERS}" \
            "${CHUNKAH_SPLITTER}"

          # Verify labels survived the round-trip
          podman inspect "${CHUNKED}" \
            | jq -e '.[0].Config.Labels["org.flatpak.ref"] // error("MISSING: org.flatpak.ref")' \
            > /dev/null
          echo "==> Flatpak labels OK"
          LAYER_COUNT=$(podman inspect "${CHUNKED}" | jq '.[0].RootFS.Layers | length')
          echo "==> Layer count: ${LAYER_COUNT}"
          [[ "${LAYER_COUNT}" -gt 1 ]] \
            && echo "==> chunkah split succeeded" \
            || echo "==> WARNING: chunkah produced only 1 layer"
          # Export for use in subsequent steps
          echo "CHUNKED=${CHUNKED}" >> "$GITHUB_ENV"
          echo "LAYER_COUNT=${LAYER_COUNT}" >> "$GITHUB_ENV"

      - name: Report layer count
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          echo "### Layer count: ${{ matrix.app }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Layers | ${LAYER_COUNT} |" >> $GITHUB_STEP_SUMMARY

      - name: Layer reuse report
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          HISTORY="/tmp/layer-history.txt"
          CURRENT=$(podman inspect "${CHUNKED}" | jq -r '.[0].RootFS.Layers[]')
          TOTAL=$(echo "${CURRENT}" | wc -l)
          if [[ -f "${HISTORY}" ]]; then
            REUSED=$(comm -12 <(sort "${HISTORY}") <(echo "${CURRENT}" | sort) | wc -l)
            CHANGED=$(( TOTAL - REUSED ))
          else
            REUSED=0
            CHANGED=${TOTAL}
          fi
          echo "${CURRENT}" > "${HISTORY}"
          echo "### Layer reuse: ${{ matrix.app }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total  | ${TOTAL}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Reused | ${REUSED}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Changed| ${CHANGED} |" >> $GITHUB_STEP_SUMMARY

      - name: Save layer history cache
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/layer-history.txt
          key: layer-history-${{ matrix.app }}-${{ matrix.arch }}-${{ github.run_id }}

      - name: Push to ghcr.io with zstd:chunked
        id: push
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          ARCH="${{ matrix.arch }}"
          case "${ARCH}" in
            x86_64)  OCI_ARCH="amd64" ;;
            aarch64) OCI_ARCH="arm64" ;;
            *)       echo "ERROR: unknown arch ${ARCH}" >&2; exit 1 ;;
          esac
          STAGING_TAG="sha-${{ github.sha }}-${OCI_ARCH}"
          TARGET="ghcr.io/${{ github.repository }}/${{ matrix.app }}:${STAGING_TAG}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          podman push \
            --compression-format=zstd:chunked \
            --digestfile /tmp/digest.txt \
            "${CHUNKED}" "docker://${TARGET}"
          DIGEST=$(cat /tmp/digest.txt)
          echo "STAGING_TAG=${STAGING_TAG}" >> "$GITHUB_ENV"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "${STAGING_TAG}" > /tmp/staging-tag.txt
          echo "==> Pushed staging tag ${TARGET} @ ${DIGEST} — layers: ${LAYER_COUNT}"

      - name: Install cosign
        if: steps.arch-check.outputs.skip != 'true'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Log in to ghcr.io for cosign
        if: steps.arch-check.outputs.skip != 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with cosign
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}

      - name: Generate SBOM
        if: steps.arch-check.outputs.skip != 'true'
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}
          format: spdx-json
          output-file: sbom-${{ matrix.app }}.spdx.json
          artifact-name: sbom-${{ matrix.app }}-${{ matrix.arch }}

      - name: Attest SBOM to registry
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.app }}.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}

      - name: Verify cosign signature
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign verify \
            --certificate-identity=${{ github.server_url }}/${{ github.repository }}/.github/workflows/build.yml@refs/heads/main \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}

      - name: Verify SBOM attestation
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          set -o pipefail
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity=${{ github.server_url }}/${{ github.repository }}/.github/workflows/build.yml@refs/heads/main \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }} \
            | jq '.payload | @base64d | fromjson | .predicateType'

      - name: Login to ghcr.io for skopeo inspect
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          # skopeo does not inherit podman's login session — explicit login required
          # Must run before any skopeo inspect step (including Verify image index shape)
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Verify labels on ghcr.io
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          skopeo inspect \
            "docker://ghcr.io/${{ github.repository }}/${{ matrix.app }}:${STAGING_TAG}" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          labels = d.get('Labels', {})
          for k in ['org.flatpak.ref', 'org.flatpak.metadata', 'org.opencontainers.image.created']:
              s = 'OK' if k in labels else 'MISSING'
              print(f'{s}: {k}')
              if s == 'MISSING': sys.exit(1)
          print('All required labels present.')
          "

      - name: Verify all layers are zstd:chunked
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          RESULTS=$(skopeo inspect --raw \
            "docker://ghcr.io/${{ github.repository }}/${{ matrix.app }}:${STAGING_TAG}" \
            | jq -r '.layers[] | "Layer \(.digest[:19]): chunked=\((.annotations // {}) | has("io.github.containers.zstd-chunked.manifest-checksum"))"')
          echo "${RESULTS}"
          echo "${RESULTS}" | grep -q "chunked=false" \
            && { echo "ERROR: one or more layers missing zstd:chunked annotation" >&2; exit 1; } \
            || echo "==> All ${LAYER_COUNT} layers are zstd:chunked"

      - name: Upload digest artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/digest.txt
          retention-days: 1

      - name: Upload staging tag artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staging-tag-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/staging-tag.txt
          retention-days: 1

  # ── Merge per-arch digests into a single OCI image index ─────────────────
  # Runs after ALL push matrix jobs complete (both x86_64 and aarch64).
  # Produces the :latest and :vX.Y.Z manifest lists that point to per-arch
  # staging digests. A single job running once per app avoids the race where
  # concurrent per-arch jobs each overwrote :latest with a 1-platform manifest.
  merge-index:
    needs: [detect, push]
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != '' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download per-arch digest artifacts
        run: |
          # Download digest artifacts for each arch — skip if not present (arch not supported).
          for ARCH in x86_64 aarch64; do
            ARTIFACT="digest-${{ matrix.app }}-${ARCH}"
            mkdir -p "/tmp/digests/${ARCH}"
            if gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                --jq ".artifacts[] | select(.name == \"${ARTIFACT}\") | .id" \
                | grep -q .; then
              gh run download "${{ github.run_id }}" \
                --name "${ARTIFACT}" \
                --dir "/tmp/digests/${ARCH}" 2>/dev/null || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version (bundle-repack apps only)
        id: version
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            VERSION=$(yq '.version // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${VERSION}" && "${VERSION}" != "null" ]] && echo "version=${VERSION}" >> "$GITHUB_OUTPUT" || true
          fi

      - name: Build and push OCI image indexes
        run: |
          APP="${{ matrix.app }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"

          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${OWNER}" --password-stdin

          # Collect per-arch digests that were actually built and pushed.
          declare -A ARCH_DIGESTS
          for ARCH in x86_64 aarch64; do
            DIGEST_FILE="/tmp/digests/${ARCH}/digest.txt"
            if [[ -f "${DIGEST_FILE}" ]]; then
              DIGEST=$(cat "${DIGEST_FILE}")
              [[ -n "${DIGEST}" ]] && ARCH_DIGESTS[${ARCH}]="${DIGEST}"
            fi
          done

          if [[ "${#ARCH_DIGESTS[@]}" -eq 0 ]]; then
            echo "ERROR: no per-arch digests found for ${APP}" >&2
            exit 1
          fi

          # Build manifest list for :latest
          podman manifest rm "localhost/${APP}:latest" 2>/dev/null || true
          podman manifest create "localhost/${APP}:latest"
          for ARCH in "${!ARCH_DIGESTS[@]}"; do
            case "${ARCH}" in
              x86_64)  OCI_ARCH="amd64" ;;
              aarch64) OCI_ARCH="arm64" ;;
            esac
            podman manifest add \
              --arch "${OCI_ARCH}" --os linux \
              "localhost/${APP}:latest" \
              "docker://ghcr.io/${REPO}/${APP}@${ARCH_DIGESTS[${ARCH}]}"
            echo "==> Added ${ARCH} (${OCI_ARCH}) @ ${ARCH_DIGESTS[${ARCH}]}"
          done
          podman manifest push --format oci \
            "localhost/${APP}:latest" \
            "docker://ghcr.io/${REPO}/${APP}:latest"
          echo "==> Pushed ghcr.io/${REPO}/${APP}:latest (${#ARCH_DIGESTS[@]} platform(s))"

          # Build manifest list for version tag (bundle-repack apps only)
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -n "${VERSION}" ]]; then
            podman manifest rm "localhost/${APP}:${VERSION}" 2>/dev/null || true
            podman manifest create "localhost/${APP}:${VERSION}"
            for ARCH in "${!ARCH_DIGESTS[@]}"; do
              case "${ARCH}" in
                x86_64)  OCI_ARCH="amd64" ;;
                aarch64) OCI_ARCH="arm64" ;;
              esac
              podman manifest add \
                --arch "${OCI_ARCH}" --os linux \
                "localhost/${APP}:${VERSION}" \
                "docker://ghcr.io/${REPO}/${APP}@${ARCH_DIGESTS[${ARCH}]}"
            done
            podman manifest push --format oci \
              "localhost/${APP}:${VERSION}" \
              "docker://ghcr.io/${REPO}/${APP}:${VERSION}"
            echo "==> Pushed ghcr.io/${REPO}/${APP}:${VERSION} (${#ARCH_DIGESTS[@]} platform(s))"
          fi

      - name: Verify image index shape
        run: |
          APP="${{ matrix.app }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${OWNER}" --password-stdin
          RAW=$(skopeo inspect --raw "docker://ghcr.io/${REPO}/${APP}:latest")
          MEDIA_TYPE=$(echo "${RAW}" | jq -r '.mediaType')
          [[ "${MEDIA_TYPE}" == "application/vnd.oci.image.index.v1+json" ]] \
            || { echo "ERROR: expected OCI index, got ${MEDIA_TYPE}" >&2; exit 1; }
          COUNT=$(echo "${RAW}" | jq '.manifests | length')
          [[ "${COUNT}" -ge 1 ]] \
            && echo "==> latest index has ${COUNT} platform(s) [${MEDIA_TYPE}]" \
            || { echo "ERROR: latest is not an image index" >&2; exit 1; }

  # ── Set package description ───────────────────────────────────────────────
  # Runs after push completes.
  # update-index is handled by the separate update-index.yml workflow
  # (triggered via workflow_run on build completion) to serialise gh-pages
  # pushes across concurrent app builds and avoid git conflicts on gh-pages.
  #
  # NOTE: Staging tags (sha-<sha>-<arch>) are intentionally NOT deleted.
  # ghcr.io permanently deletes manifest blobs when a version is deleted —
  # skopeo copy within the same registry creates only a tag alias, not an
  # independent copy. Deleting the staging tag version kills the content
  # manifest that the OCI image index references by digest, breaking
  # flatpak install with "manifest unknown". Staging tags accumulate (one
  # per build per arch) and are cleaned up manually via the cleanup.yml
  # workflow when needed.
  cleanup:
    needs: [detect, push, merge-index]
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != '' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set package description
        run: |
          APP="${{ matrix.app }}"
          REPO_NAME="${{ github.event.repository.name }}"
          DESC_FILE="flatpaks/${APP}/release.yaml"
          if [[ -f "${DESC_FILE}" ]]; then
            DESCRIPTION=$(yq '.description' "${DESC_FILE}")
            [[ "${DESCRIPTION}" != "null" && -n "${DESCRIPTION}" ]] || { echo "==> No description in release.yaml, skipping"; exit 0; }
            # Package name under owner is "reponame/appname" — URL-encode the slash.
            # Note: PATCH /user/packages/container/<name> returns 404 for user-scoped packages
            # (same limitation as visibility — web UI only). Best-effort, non-fatal.
            ENCODED_NAME="${REPO_NAME}%2F${APP}"
            if gh api --method PATCH "/user/packages/container/${ENCODED_NAME}" \
                -f description="${DESCRIPTION}" 2>/dev/null; then
              echo "==> Set package description: ${DESCRIPTION}"
            else
              echo "==> WARNING: Could not set package description via API (known GitHub limitation — set manually in web UI)"
            fi
          else
            echo "==> No release.yaml for ${APP}, skipping package description"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
