name: Build Flatpak OCI

on:
  push:
    paths:
      - 'flatpaks/**'
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build (directory name under flatpaks/)'
        required: false
        default: ''

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Top-level: deny all. Each job declares only what it needs.
permissions: {}

jobs:

  # ── Detect which apps changed ──────────────────────────────────────────────
  detect:
    runs-on: ubuntu-24.04
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: detect
        run: |
          if [[ -n "${{ inputs.app }}" ]]; then
            echo 'apps=["${{ inputs.app }}"]' >> "$GITHUB_OUTPUT"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            APPS=$(git diff --name-only HEAD~1 HEAD -- 'flatpaks/' \
              | cut -d/ -f2 | sort -u \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          else
            # First commit or shallow clone — treat all flatpak dirs as changed
            APPS=$(ls -d flatpaks/*/ 2>/dev/null \
              | xargs -I{} basename {} \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build flatpak inside gnome-49 container ────────────────────────────────
  build:
    needs: detect
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ubuntu-24.04
    # When aarch64 is enabled: runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    # and add runner: ubuntu-24.04 (or ubuntu-24.04-arm) to each matrix include entry
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
        arch: [x86_64]
        # aarch64 stub — uncomment when ready to enable QEMU builds:
        # include:
        #   - arch: aarch64
        #     runner: ubuntu-24.04        # QEMU on x86_64 host
        # Add to "Push to ghcr.io" step when enabling:
        #   - name: Set up QEMU
        #     uses: docker/setup-qemu-action@<SHA> # add before build step
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    # SOURCE_DATE_EPOCH=0: normalises tar timestamps so OCI blob hashes are deterministic
    # across identical-content builds. build-bundle reads this env directly.
    env:
      SOURCE_DATE_EPOCH: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect build path
        id: detect-path
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            echo "mode=bundle-repack" >> "$GITHUB_OUTPUT"
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            echo "mode=flatpak-builder" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: no manifest.yaml or release.yaml in flatpaks/${{ matrix.app }}/" >&2
            exit 1
          fi

      # ── flatpak-builder path (e.g. ghostty) ──────────────────────────────
      # The v6 action:
      #   - runs flatpak-builder with --ccache --disable-rofiles-fuse --force-clean
      #   - caches .flatpak-builder/ via actions/cache
      #   - cache key: flatpak-builder-${arch}-${manifestHash:0:20}
      #   - fallback restore key: flatpak-builder-${arch}  (ccache reuse on manifest change)
      #   - writes OSTree repo to ./repo  (hardcoded localRepoName — NOT .ostree-repo)
      #   - build-bundle: false → skips bundle step; we export OCI ourselves
      #   - upload-artifact: false → we upload ourselves (correct artifact name per arch)
      - name: Build with flatpak-builder (cached)
        if: steps.detect-path.outputs.mode == 'flatpak-builder'
        uses: flatpak/flatpak-github-actions/flatpak-builder@92ae9851ad316786193b1fd3f40c4b51eb5cb101 # v6
        with:
          manifest-path: flatpaks/${{ matrix.app }}/manifest.yaml
          build-bundle: false
          upload-artifact: false
          cache: true
          cache-key: flatpak-${{ matrix.app }}-${{ matrix.arch }}
          branch: stable

      - name: Export OCI bundle (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder'
        run: |
          APP_ID=$(python3 -c "
          import sys
          for line in open(sys.argv[1]):
              line = line.strip()
              if line.startswith('app-id:'):
                  print(line.split(':', 1)[1].strip())
                  break
          " "flatpaks/${{ matrix.app }}/manifest.yaml")
          [[ -n "${APP_ID}" ]] || { echo "ERROR: could not determine app-id" >&2; exit 1; }
          echo "==> Exporting OCI for ${APP_ID} (arch: ${{ matrix.arch }}, branch: stable)"
          # OSTree repo is at ./repo (action hardcodes localRepoName='repo')
          # NAME = app-id only (not a full ref path); BRANCH = stable; --arch sets target arch
          # Do NOT pass --override-source-date-epoch — that flag belongs to flatpak-builder only
          # SOURCE_DATE_EPOCH=0 env (set at job level) is sufficient for build-bundle
          flatpak build-bundle --oci --arch="${{ matrix.arch }}" repo "${{ matrix.app }}.oci" "${APP_ID}" stable

      # ── Bundle repack path (e.g. goose) ──────────────────────────────────
      # Downloads upstream .flatpak, verifies sha256, imports into OSTree, exports OCI.
      # No flatpak-builder invocation — upstream build is trusted as-is.
      - name: Download and verify upstream bundle
        if: steps.detect-path.outputs.mode == 'bundle-repack'
        run: |
          DESC="flatpaks/${{ matrix.app }}/release.yaml"
          APP_ID=$(python3 -c "
          import sys
          for line in open(sys.argv[1]):
              line = line.strip()
              if line.startswith('app-id:'):
                  print(line.split(':', 1)[1].strip())
                  break
          " "${DESC}")
          VERSION=$(python3 -c "
          import sys
          for line in open(sys.argv[1]):
              line = line.strip()
              if line.startswith('version:'):
                  print(line.split(':', 1)[1].strip())
                  break
          " "${DESC}")
          URL=$(python3 -c "
          import sys
          for line in open(sys.argv[1]):
              line = line.strip()
              if line.startswith('url:'):
                  print(line.split(':', 1)[1].strip())
                  break
          " "${DESC}")
          EXPECTED_SHA=$(python3 -c "
          import sys
          for line in open(sys.argv[1]):
              line = line.strip()
              if line.startswith('sha256:'):
                  print(line.split(':', 1)[1].strip())
                  break
          " "${DESC}")
          [[ -n "${APP_ID}" && -n "${VERSION}" && -n "${URL}" && -n "${EXPECTED_SHA}" ]] \
            || { echo "ERROR: release.yaml missing required fields" >&2; exit 1; }
          echo "APP_ID=${APP_ID}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          BUNDLE_FILE="/tmp/${{ matrix.app }}-${VERSION}.flatpak"
          echo "BUNDLE_FILE=${BUNDLE_FILE}" >> "$GITHUB_ENV"
          echo "==> Downloading ${URL}"
          curl -fsSL -o "${BUNDLE_FILE}" "${URL}"
          ACTUAL_SHA=$(sha256sum "${BUNDLE_FILE}" | cut -d' ' -f1)
          if [[ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "ERROR: sha256 mismatch" >&2
            echo "  expected: ${EXPECTED_SHA}" >&2
            echo "  actual:   ${ACTUAL_SHA}" >&2
            exit 1
          fi
          echo "==> sha256 OK: ${ACTUAL_SHA}"

      - name: Import bundle and export OCI (bundle-repack path)
        if: steps.detect-path.outputs.mode == 'bundle-repack'
        run: |
          ARCH="${{ matrix.arch }}"
          REF="app/${APP_ID}/${ARCH}/stable"
          echo "==> Importing ${BUNDLE_FILE} → OSTree ref ${REF}"
          # --ref: override embedded ref to match our standard naming
          flatpak build-import-bundle --ref="${REF}" repo "${BUNDLE_FILE}"
          echo "==> Exporting OCI bundle"
          flatpak build-bundle --oci --arch="${ARCH}" repo "${{ matrix.app }}.oci" "${APP_ID}" stable

      - name: Upload OCI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci/
          retention-days: 1

  # ── Push OCI to ghcr.io with zstd:chunked ─────────────────────────────────
  push:
    needs: [detect, build]
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ubuntu-24.04
    # When aarch64 is enabled: runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
        arch: [x86_64]
        # aarch64 stub — see build job comment
    steps:
      - uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v9
        with:
          extra-squeeze: "true"

      - name: Download OCI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci

      - name: Split layers with chunkah
        env:
          APP: ${{ matrix.app }}
          CHUNKAH_IMAGE: quay.io/jlebon/chunkah:v0.2.0
        run: |
          # Load single-layer OCI into podman image store
          # --quiet: image ID only, no progress noise
          IMAGE_ID=$(podman pull --quiet "oci:./${APP}.oci")
          echo "==> Single-layer image: ${IMAGE_ID}"
          podman pull "${CHUNKAH_IMAGE}"
          # Preserve image config (labels etc.) across chunkah round-trip
          export CHUNKAH_CONFIG_STR
          CHUNKAH_CONFIG_STR=$(podman inspect "${IMAGE_ID}" | jq -c '.[0]')
          echo "==> Running chunkah to split into content-based layers"
          podman run --rm \
            --mount=type=image,src="${IMAGE_ID}",dest=/chunkah \
            -e CHUNKAH_CONFIG_STR \
            "${CHUNKAH_IMAGE}" build \
            > /tmp/${APP}-chunked.ociarchive
          CHUNKED_ID=$(podman load < /tmp/${APP}-chunked.ociarchive \
            | grep 'Loaded image:' | grep -oP '(?<=sha256:)[a-f0-9]+')
          echo "==> Chunked image: ${CHUNKED_ID}"
          # Verify labels survived the round-trip
          podman inspect "${CHUNKED_ID}" \
            | jq -e '.[0].Config.Labels["org.flatpak.ref"] // error("MISSING: org.flatpak.ref")' \
            > /dev/null
          echo "==> Flatpak labels OK"
          LAYER_COUNT=$(podman inspect "${CHUNKED_ID}" | jq '.[0].RootFS.Layers | length')
          echo "==> Layer count: ${LAYER_COUNT}"
          [[ "${LAYER_COUNT}" -gt 1 ]] \
            && echo "==> chunkah split succeeded" \
            || echo "==> WARNING: chunkah produced only 1 layer"
          # Export for use in subsequent steps
          echo "CHUNKED_ID=${CHUNKED_ID}" >> "$GITHUB_ENV"
          echo "LAYER_COUNT=${LAYER_COUNT}" >> "$GITHUB_ENV"

      - name: Push to ghcr.io with zstd:chunked
        id: push
        run: |
          TAG="latest-${{ matrix.arch }}"
          TARGET="ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:${TAG}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          podman push \
            --compression-format=zstd:chunked \
            --digestfile /tmp/digest.txt \
            "${CHUNKED_ID}" "docker://${TARGET}"
          DIGEST=$(cat /tmp/digest.txt)
          echo "==> Pushed ${TARGET} @ ${DIGEST} — layers: ${LAYER_COUNT}"

      - name: Login to ghcr.io for skopeo inspect
        run: |
          # skopeo does not inherit podman's login session — explicit login required
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Verify labels on ghcr.io
        run: |
          TAG="latest-${{ matrix.arch }}"
          skopeo inspect \
            "docker://ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:${TAG}" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          labels = d.get('Labels', {})
          for k in ['org.flatpak.ref', 'org.flatpak.metadata']:
              s = 'OK' if k in labels else 'MISSING'
              print(f'{s}: {k}')
              if s == 'MISSING': sys.exit(1)
          print('All required labels present.')
          "

      - name: Verify all layers are zstd:chunked
        run: |
          TAG="latest-${{ matrix.arch }}"
          RESULTS=$(skopeo inspect --raw \
            "docker://ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:${TAG}" \
            | jq -r '.layers[] | "Layer \(.digest[:19]): chunked=\((.annotations // {}) | has("io.github.containers.zstd-chunked.manifest-checksum"))"')
          echo "${RESULTS}"
          echo "${RESULTS}" | grep -q "chunked=false" \
            && { echo "ERROR: one or more layers missing zstd:chunked annotation" >&2; exit 1; } \
            || echo "==> All ${LAYER_COUNT} layers are zstd:chunked"

      - name: Upload digest artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/digest.txt
          retention-days: 1

  # ── Update gh-pages index ──────────────────────────────────────────────────
  update-index:
    needs: [detect, push]
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    # Serialise gh-pages pushes — prevents race if two workflow runs overlap
    concurrency:
      group: gh-pages-update
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: main

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: gh-pages
          path: pages

      - name: Download all digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digest-*
          path: /tmp/digests

      - name: Login to ghcr.io for skopeo inspect
        run: |
          # update-index.py calls skopeo inspect against ghcr.io.
          # Login required even for public packages to avoid rate limiting and
          # to handle the window before the package is set public after first push.
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Update index for each app and arch
        run: |
          cd pages
          APPS='${{ needs.detect.outputs.apps }}'
          for APP in $(echo "${APPS}" | jq -r '.[]'); do
            for ARCH in x86_64 aarch64; do
              DIGEST_FILE="/tmp/digests/digest-${APP}-${ARCH}/digest.txt"
              if [[ -f "${DIGEST_FILE}" ]]; then
                DIGEST=$(cat "${DIGEST_FILE}")
                echo "==> Updating index: ${APP} ${ARCH} ${DIGEST}"
                python3 ../main/scripts/update-index.py \
                  --app "${APP}" \
                  --digest "${DIGEST}" \
                  --registry ghcr.io \
                  --repo "${{ github.repository_owner }}/${APP}" \
                  --tags "latest-${ARCH}"
              else
                echo "WARNING: no digest for ${APP}/${ARCH}, skipping"
              fi
            done
          done

      - name: Commit and push index
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index/static
          if git diff --cached --quiet; then
            echo "index unchanged, skipping commit"
          else
            git commit -m "chore(index): update from build ${{ github.run_number }} [skip ci]"
            git push
          fi
