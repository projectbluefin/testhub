name: Build → Sign → Publish Flatpak OCI
run-name: "[${{ github.ref_name }}] ${{ inputs.app || 'all apps' }}: build → sign → publish"

on:
  push:
    paths:
      - 'flatpaks/**'
    branches: [main]
  pull_request:
    paths:
      - 'flatpaks/**'
  merge_group:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build (directory name under flatpaks/)'
        required: false
        default: ''

concurrency:
  # Scope cancellation to the same package on the same ref.
  # workflow_dispatch with app=X: cancels a prior in-progress run for the same app.
  # push: uses github.sha so each commit is independent — no cross-package cancellation
  # (the triggered app isn't known at workflow level for push events).
  group: build-${{ github.ref }}-${{ inputs.app || github.sha }}
  cancel-in-progress: true

# Top-level: deny all. Each job declares only what it needs.
permissions: {}

jobs:

  # ── Detect which apps changed ──────────────────────────────────────────────
  diff-changed-apps:
    runs-on: ubuntu-24.04
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: detect
        run: |
          if [[ -n "${{ inputs.app }}" ]]; then
            echo 'apps=["${{ inputs.app }}"]' >> "$GITHUB_OUTPUT"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            APPS=$(git diff --name-only HEAD~1 HEAD -- 'flatpaks/' \
              | cut -d/ -f2 | sort -u \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          else
            # First commit or shallow clone — treat all flatpak dirs as changed
            APPS=$(ls -d flatpaks/*/ 2>/dev/null \
              | xargs -I{} basename {} \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build flatpak inside gnome-49 container ────────────────────────────────
  compile-oci:
    needs: diff-changed-apps
    if: needs.diff-changed-apps.outputs.apps != '[]' && needs.diff-changed-apps.outputs.apps != ''
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    # SOURCE_DATE_EPOCH=0: normalises tar timestamps so OCI blob hashes are deterministic
    # across identical-content builds. build-bundle reads this env directly.
    env:
      SOURCE_DATE_EPOCH: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yq
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          wget "https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_${ARCH}" \
            -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq

      - name: Detect build path and arch support
        id: detect-path
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            echo "mode=bundle-repack" >> "$GITHUB_OUTPUT"
            # Check arches field: if set, skip unsupported arches
            ARCHES=$(yq '.arches // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} on ${{ matrix.arch }} (not in arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            echo "mode=flatpak-builder" >> "$GITHUB_OUTPUT"
            # Check x-arches field for manifest.yaml apps that are arch-restricted
            ARCHES=$(yq '.x-arches // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} on ${{ matrix.arch }} (not in x-arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
            # Skip soft-disabled apps (auto-imported and retired via sync-runtime-issues)
            DISABLED=$(yq '.["x-disabled"] // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ "${DISABLED}" == "true" ]]; then
              echo "==> Skipping ${{ matrix.app }} (x-disabled: true)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ERROR: no manifest.yaml or release.yaml in flatpaks/${{ matrix.app }}/" >&2
            exit 1
          fi

      # ── flatpak-builder path (e.g. ghostty) ──────────────────────────────
      # The v6 action:
      #   - runs flatpak-builder with --ccache --disable-rofiles-fuse --force-clean
      #   - caches .flatpak-builder/ via actions/cache
      #   - cache key: flatpak-builder-${arch}-${manifestHash:0:20}
      #   - fallback restore key: flatpak-builder-${arch}  (ccache reuse on manifest change)
      #   - writes OSTree repo to ./repo  (hardcoded localRepoName — NOT .ostree-repo)
      #   - build-bundle: false → skips bundle step; we export OCI ourselves
      #   - upload-artifact: false → we upload ourselves (correct artifact name per arch)
      - name: Read manifest branch (flatpak-builder path)
        id: manifest-meta
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          BRANCH=$(python3 -c "import yaml,sys; d=yaml.safe_load(open(sys.argv[1])); print(d.get('default-branch','stable'))" "flatpaks/${{ matrix.app }}/manifest.yaml")
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Validate metainfo XML
        if: steps.detect-path.outputs.skip != 'true'
        run: |
          METAINFO=$(find flatpaks/${{ matrix.app }} -name "*.metainfo.xml" | head -1)
          if [ -n "${METAINFO}" ]; then
            echo "==> Validating ${METAINFO}"
            appstreamcli validate --no-net "${METAINFO}" || true
          else
            echo "==> No metainfo XML found for ${{ matrix.app }} — skipping validation"
          fi

      - name: Lint Flatpak manifest
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          # flatpak-builder-lint is available directly in the gnome-49 container at /app/bin/flatpak-builder-lint
          # Runs before the build to catch manifest issues early. Fails the job on errors.
          EXCEPTIONS_FILE="flatpaks/${{ matrix.app }}/exceptions.json"
          if [ -f "${EXCEPTIONS_FILE}" ]; then
            flatpak-builder-lint --exceptions --user-exceptions "${EXCEPTIONS_FILE}" manifest "flatpaks/${{ matrix.app }}/manifest.yaml"
          else
            flatpak-builder-lint manifest "flatpaks/${{ matrix.app }}/manifest.yaml"
          fi

      - name: Build with flatpak-builder (cached)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        uses: flatpak/flatpak-github-actions/flatpak-builder@92ae9851ad316786193b1fd3f40c4b51eb5cb101 # v6
        with:
          manifest-path: flatpaks/${{ matrix.app }}/manifest.yaml
          arch: ${{ matrix.arch }}
          build-bundle: false
          upload-artifact: false
          cache: true
          cache-key: flatpak-${{ matrix.app }}-${{ matrix.arch }}-${{ hashFiles(format('flatpaks/{0}/manifest.yaml', matrix.app)) }}
          branch: ${{ steps.manifest-meta.outputs.branch }}

      - name: Lint build directory (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          # flatpak-builder-lint builddir checks the build staging dir after build but before
          # OSTree export: appstream catalog present, desktop file valid, icon installed, ELF arch.
          # build-dir defaults to flatpak_app (flatpak/flatpak-github-actions v6 default).
          EXCEPTIONS_FILE="flatpaks/${{ matrix.app }}/exceptions.json"
          if [ -f "${EXCEPTIONS_FILE}" ]; then
            flatpak-builder-lint --exceptions --user-exceptions "${EXCEPTIONS_FILE}" builddir flatpak_app
          else
            flatpak-builder-lint builddir flatpak_app
          fi

      - name: Lint OSTree repo (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          # flatpak-builder-lint repo checks the exported OSTree repository: ref shape, appstream
          # catalog in OSTree, screenshot mirroring. repo-dir defaults to repo (v6 default).
          EXCEPTIONS_FILE="flatpaks/${{ matrix.app }}/exceptions.json"
          if [ -f "${EXCEPTIONS_FILE}" ]; then
            flatpak-builder-lint --exceptions --user-exceptions "${EXCEPTIONS_FILE}" repo repo
          else
            flatpak-builder-lint repo repo
          fi

      - name: Export OCI bundle (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          APP_ID=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('flatpaks/${{ matrix.app }}/manifest.yaml')); print(d['app-id'])")
          [[ -n "${APP_ID}" && "${APP_ID}" != "null" ]] || { echo "ERROR: could not determine app-id" >&2; exit 1; }
          BRANCH="${{ steps.manifest-meta.outputs.branch }}"
          echo "==> Exporting OCI for ${APP_ID} (arch: ${{ matrix.arch }}, branch: ${BRANCH})"
          # OSTree repo is at ./repo (action hardcodes localRepoName='repo')
          # NAME = app-id only (not a full ref path); BRANCH from manifest default-branch; --arch sets target arch
          # Do NOT pass --override-source-date-epoch — that flag belongs to flatpak-builder only
          # SOURCE_DATE_EPOCH=0 env (set at job level) is sufficient for build-bundle
          flatpak build-bundle --oci --arch="${{ matrix.arch }}" repo "${{ matrix.app }}.oci" "${APP_ID}" "${BRANCH}"

      # ── Bundle repack path (e.g. goose) ──────────────────────────────────
      # Downloads upstream .flatpak, verifies sha256, imports into OSTree, exports OCI.
      # No flatpak-builder invocation — upstream build is trusted as-is.
      - name: Download and verify upstream bundle
        if: steps.detect-path.outputs.mode == 'bundle-repack' && steps.detect-path.outputs.skip != 'true'
        run: |
          DESC="flatpaks/${{ matrix.app }}/release.yaml"
          APP_ID=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['app-id'])")
          VERSION=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['version'])")
          URL=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['url'])")
          EXPECTED_SHA=$(python3 -c "import yaml,sys; d=yaml.safe_load(open('${DESC}')); print(d['sha256'])")
          [[ -n "${APP_ID}" && "${APP_ID}" != "null" \
          && -n "${VERSION}" && "${VERSION}" != "null" \
          && -n "${URL}" && "${URL}" != "null" \
          && -n "${EXPECTED_SHA}" && "${EXPECTED_SHA}" != "null" ]] \
            || { echo "ERROR: release.yaml missing required fields" >&2; exit 1; }
          echo "APP_ID=${APP_ID}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "UPSTREAM_URL=${URL}" >> "$GITHUB_ENV"
          BUNDLE_FILE="/tmp/${{ matrix.app }}-${VERSION}.flatpak"
          echo "BUNDLE_FILE=${BUNDLE_FILE}" >> "$GITHUB_ENV"
          echo "==> Downloading ${URL}"
          curl -fsSL -o "${BUNDLE_FILE}" "${URL}"
          ACTUAL_SHA=$(sha256sum "${BUNDLE_FILE}" | cut -d' ' -f1)
          if [[ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "ERROR: sha256 mismatch" >&2
            echo "  expected: ${EXPECTED_SHA}" >&2
            echo "  actual:   ${ACTUAL_SHA}" >&2
            exit 1
          fi
          echo "==> sha256 OK: ${ACTUAL_SHA}"

      - name: Import bundle and export OCI (bundle-repack path)
        if: steps.detect-path.outputs.mode == 'bundle-repack' && steps.detect-path.outputs.skip != 'true'
        run: |
          ARCH="${{ matrix.arch }}"
          REF="app/${APP_ID}/${ARCH}/stable"
          ostree init --mode=archive-z2 --repo=repo
          echo "==> Importing ${BUNDLE_FILE} → OSTree ref ${REF}"
          # --ref: override embedded ref to match our standard naming
          flatpak build-import-bundle --ref="${REF}" repo "${BUNDLE_FILE}"
          echo "==> Exporting OCI bundle"
          flatpak build-bundle --oci --arch="${ARCH}" repo "${{ matrix.app }}.oci" "${APP_ID}" stable

      - name: Upload OCI artifact
        if: steps.detect-path.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci/
          retention-days: 1

      - name: File issue on build failure
        if: failure() && steps.detect-path.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          APP="${{ matrix.app }}"
          BRANCH="raptor/runtime-${APP}"
          TITLE="Build failure: ${APP} (${{ matrix.arch }})"

          # Find the open runtime-update issue for this app (if any)
          RUNTIME_ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "runtime-update: ${APP}" \
            --json number,title \
            --jq "[.[] | select(.title | startswith(\"runtime-update: ${APP}\"))] | .[0].number // \"\"")
          if [[ -n "${RUNTIME_ISSUE}" ]]; then
            RUNTIME_LINK="**Runtime-update issue:** #${RUNTIME_ISSUE}"
          else
            RUNTIME_LINK=""
          fi

          # Determine the source branch (PR builds expose head_ref; push builds expose ref)
          SOURCE_BRANCH="${HEAD_REF}"
          if [[ -z "${SOURCE_BRANCH}" ]]; then
            SOURCE_BRANCH="${{ github.ref_name }}"
          fi

          BODY="## Build failure: \`${APP}\` on \`${{ matrix.arch }}\`

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** \`${{ github.event_name }}\` on branch \`${SOURCE_BRANCH}\`
          ${RUNTIME_LINK}

          The \`compile-oci\` job failed for this app/arch combination.
          Check the run link above for the full log output.

          ## Fixing agent instructions

          **Target branch:** \`${BRANCH}\`

          If a PR for this branch already exists, push your fix commits directly to \`${BRANCH}\`.
          Do NOT open a new PR — one PR per app, always.

          If no PR exists yet, create one from \`${BRANCH}\` → \`main\`.

          ## Checklist for the fixing agent

          - [ ] Read the full build log and identify the root cause
          - [ ] Fix the issue (missing patch file, bad manifest field, lint exception, etc.)
          - [ ] Commit fix to branch \`${BRANCH}\` (push to existing PR, or open a new one if none exists)
          - [ ] If the fix reveals an app-specific quirk (e.g. local patch files, finish-args oddities, appstream gaps), document it in \`skills/app-gotchas.md\` under a \`### ${APP}\` heading — commit to same branch
          - [ ] If the fix reveals a gap in the sync script or pipeline (e.g. patch files not fetched on import), update the relevant skill in \`skills/\` — commit to same branch
          - [ ] Add any new lint exceptions to \`flatpaks/${APP}/exceptions.json\`
          - [ ] Close this issue once the fix is merged and the build passes"

          # Avoid duplicate issues: check if an open issue with the same title exists
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "\"${TITLE}\"" \
            --json number \
            --jq '.[0].number // ""')
          if [[ -n "${EXISTING}" ]]; then
            echo "==> Open issue #${EXISTING} already exists for this failure — skipping"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "${TITLE}" \
              --body "${BODY}" \
              --label "build-failure"
            echo "==> Filed new issue: ${TITLE}"
          fi

  # ── Build gate (required check for merge queue) ───────────────────────────
  # Single stable job name that requires all build matrix entries to pass.
  # This is what the branch ruleset requires as a status check.
  build-complete:
    needs: [diff-changed-apps, compile-oci]
    if: always() && needs.diff-changed-apps.outputs.apps != '[]' && needs.diff-changed-apps.outputs.apps != ''
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.compile-oci.result }}" != "success" ]]; then
            echo "ERROR: build matrix did not fully succeed (result: ${{ needs.compile-oci.result }})" >&2
            exit 1
          fi
          echo "==> All build jobs passed"

  # ── Push OCI to ghcr.io with zstd:chunked ─────────────────────────────────
  sign-and-push:
    needs: [diff-changed-apps, compile-oci]
    if: needs.diff-changed-apps.outputs.apps != '[]' && needs.diff-changed-apps.outputs.apps != '' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      # Disabled: sign-and-push only downloads artifacts + runs podman/buildah/push.
      # That workload fits in the default ~29 GB free on ubuntu-24.04 without cleanup.
      # Re-enable if disk pressure is observed in this job.
      # - uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v9
      #   with:
      #     extra-squeeze: "true"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install podman 5.x via Homebrew
        run: |
          /home/linuxbrew/.linuxbrew/bin/brew install podman
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          # Point podman to Homebrew's crun (system /usr/bin/crun is too old on ubuntu-24.04).
          mkdir -p ~/.config/containers
          printf '[engine]\nruntime = "/home/linuxbrew/.linuxbrew/bin/crun"\n' \
            > ~/.config/containers/containers.conf

      - name: Enable user namespaces for rootless podman
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Check arch support
        id: arch-check
        run: |
          # Mirror the arch-exclusion logic from the build job.
          # release.yaml apps: check arches field.
          # manifest.yaml apps: check x-arches field.
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            ARCHES=$(yq '.arches // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} push on ${{ matrix.arch }} (not in arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            ARCHES=$(yq '.x-arches // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} push on ${{ matrix.arch }} (not in x-arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
            DISABLED=$(yq '.["x-disabled"] // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ "${DISABLED}" == "true" ]]; then
              echo "==> Skipping ${{ matrix.app }} push (x-disabled: true)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Read release metadata
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          # GITHUB_ENV is job-scoped — re-derive version here from source descriptors.
          # Bundle-repack: read version + url from release.yaml.
          # Flatpak-builder: read x-version from manifest.yaml (x- prefix is ignored by flatpak-builder).
          # If neither supplies a version, only :latest is pushed (ghostty tip, etc.).
          DESC="flatpaks/${{ matrix.app }}/release.yaml"
          MANIFEST="flatpaks/${{ matrix.app }}/manifest.yaml"
          if [[ -f "${DESC}" ]]; then
            VERSION=$(yq '.version' "${DESC}")
            URL=$(yq '.url' "${DESC}")
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
            echo "UPSTREAM_URL=${URL}" >> "$GITHUB_ENV"
            echo "==> Bundle-repack: VERSION=${VERSION}"
          elif [[ -f "${MANIFEST}" ]]; then
            X_VERSION=$(yq '.x-version // ""' "${MANIFEST}")
            if [[ -n "${X_VERSION}" && "${X_VERSION}" != "null" ]]; then
              echo "VERSION=${X_VERSION}" >> "$GITHUB_ENV"
              echo "==> Flatpak-builder: VERSION=${X_VERSION}"
            else
              echo "==> Flatpak-builder: no x-version in manifest.yaml — only :latest will be pushed"
            fi
          fi

      - name: Download OCI artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci

      - name: Restore layer history cache
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/layer-history.txt
          key: layer-history-${{ matrix.app }}-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: layer-history-${{ matrix.app }}-${{ matrix.arch }}-

      - name: Split layers with chunkah
        if: steps.arch-check.outputs.skip != 'true'
        env:
          APP: ${{ matrix.app }}
        run: |
          # podman requires repository names to be lowercase; app-ids may contain uppercase
          APP_LOWER="${APP,,}"
          INPUT="localhost/${APP_LOWER}:input"
          LABELED="localhost/${APP_LOWER}:labeled"
          CHUNKED="localhost/${APP_LOWER}:chunked"

          # Pull OCI dir into the shared podman/buildah store and tag for stable reference.
          IMAGE_ID=$(podman pull --quiet "oci:./${APP}.oci")
          podman tag "${IMAGE_ID}" "${INPUT}"

          # Apply OCI labels via podman build --from (overrides FROM without adding a
          # content layer — only config metadata changes, identical to buildah from/config/commit/rm).
          CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LABEL_ARGS=(
            --label "org.opencontainers.image.version=${VERSION:-}"
            --label "org.opencontainers.image.source=${UPSTREAM_URL:-}"
            --label "org.opencontainers.image.created=${CREATED}"
            --label "org.opencontainers.image.vendor=${{ github.repository_owner }}"
            --label "org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}"
            --label "org.opencontainers.image.revision=${{ github.sha }}"
          )
          # title/description/license only exist in release.yaml (bundle-repack path)
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            TITLE=$(yq '.title // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            DESCRIPTION=$(yq '.description // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            LICENSE=$(yq '.license // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${TITLE}" && "${TITLE}" != "null" ]] && LABEL_ARGS+=(--label "org.opencontainers.image.title=${TITLE}") || true
            [[ -n "${DESCRIPTION}" && "${DESCRIPTION}" != "null" ]] && LABEL_ARGS+=(--label "org.opencontainers.image.description=${DESCRIPTION}") || true
            [[ -n "${LICENSE}" && "${LICENSE}" != "null" ]] && LABEL_ARGS+=(--label "org.opencontainers.image.licenses=${LICENSE}") || true
          fi
          podman build \
            --from "${INPUT}" \
            "${LABEL_ARGS[@]}" \
            --no-cache \
            -t "${LABELED}" \
            -f /dev/stdin <<< 'FROM placeholder'
          echo "==> OCI labels applied"

          # Per-app max-layers tuning: read from x-chunkah-max-layers (manifest.yaml)
          # or chunkah-max-layers (release.yaml), defaulting to 16.
          if [[ -f "flatpaks/${APP}/release.yaml" ]]; then
            MAX_LAYERS=$(yq '.["chunkah-max-layers"] // 16' "flatpaks/${APP}/release.yaml")
          else
            MAX_LAYERS=$(yq '.["x-chunkah-max-layers"] // 16' "flatpaks/${APP}/manifest.yaml")
          fi
          echo "==> MAX_LAYERS=${MAX_LAYERS}"

          # podman inspect produces the array format chunkah's parse_config accepts.
          # Must use LABELED (has labels) not INPUT (pre-label image).
          export CHUNKAH_CONFIG_STR
          CHUNKAH_CONFIG_STR=$(podman inspect "${LABELED}" | jq -c '.[0]')

          # podman build internally uses Buildah code but ships as part of podman 5.x
          # (installed via Homebrew above). All flags are identical to buildah build.
          #
          # Custom Containerfile replaces the upstream Containerfile.splitter URL
          # to inject a user.component xattr on the rootfs before chunkah scans it.
          # chunkah requires at least one "component repo" (xattr, rpmdb, or
          # bigfiles >= 1MB). Flatpak manifest.yaml apps (e.g. Kontainer) may have
          # no large files and no rpmdb, so bigfiles and rpm repos both return None.
          # Setting user.component on / activates the xattr repo; all files inherit
          # it via directory inheritance. The mount uses rw so setfattr can write to
          # the overlay layer. attr (setfattr) is installed from Fedora 43 (~1s).
          CHUNKAH_CONTAINERFILE=$(mktemp)
          printf '%s\n' \
            'ARG CHUNKAH=quay.io/jlebon/chunkah:latest' \
            'ARG CHUNKAH_ARGS=""' \
            'ARG CHUNKAH_CONFIG_STR' \
            'ARG APP_ID="app"' \
            '' \
            'FROM overridden AS target' \
            'FROM ${CHUNKAH} AS chunkah' \
            'ARG CHUNKAH_CONFIG_STR' \
            'ARG CHUNKAH_ARGS' \
            'ARG APP_ID' \
            'RUN --mount=type=bind,target=/run/src,rw \' \
            '    --mount=from=target,target=/chunkah,rw \' \
            '      dnf5 install -y --setopt=install_weak_deps=False --nodocs attr \' \
            '      && setfattr -n user.component -v "${APP_ID}" /chunkah \' \
            '      && chunkah build ${CHUNKAH_ARGS} > /run/src/out.ociarchive' \
            '' \
            'FROM oci-archive:out.ociarchive' \
            > "${CHUNKAH_CONTAINERFILE}"
          echo "==> Running chunkah via podman build"
          podman build \
            --skip-unused-stages=false \
            --from "${LABELED}" \
            -t "${CHUNKED}" \
            -v "$(pwd):/run/src" \
            --security-opt=label=disable \
            --build-arg CHUNKAH_CONFIG_STR \
            --build-arg "CHUNKAH_ARGS=--max-layers ${MAX_LAYERS}" \
            --build-arg "APP_ID=${APP}" \
            -f "${CHUNKAH_CONTAINERFILE}"

          # Verify labels survived the round-trip
          podman inspect "${CHUNKED}" \
            | jq -e '.[0].Config.Labels["org.flatpak.ref"] // error("MISSING: org.flatpak.ref")' \
            > /dev/null
          echo "==> Flatpak labels OK"
          LAYER_COUNT=$(podman inspect "${CHUNKED}" | jq '.[0].RootFS.Layers | length')
          echo "==> Layer count: ${LAYER_COUNT}"
          [[ "${LAYER_COUNT}" -gt 1 ]] \
            && echo "==> chunkah split succeeded" \
            || echo "==> WARNING: chunkah produced only 1 layer"
          # Export for use in subsequent steps
          echo "CHUNKED=${CHUNKED}" >> "$GITHUB_ENV"
          echo "LAYER_COUNT=${LAYER_COUNT}" >> "$GITHUB_ENV"

      - name: Report layer count
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          echo "### Layer count: ${{ matrix.app }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Layers | ${LAYER_COUNT} |" >> $GITHUB_STEP_SUMMARY

      - name: Layer reuse report
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          HISTORY="/tmp/layer-history.txt"
          CURRENT=$(podman inspect "${CHUNKED}" | jq -r '.[0].RootFS.Layers[]')
          TOTAL=$(echo "${CURRENT}" | wc -l)
          if [[ -f "${HISTORY}" ]]; then
            REUSED=$(comm -12 <(sort "${HISTORY}") <(echo "${CURRENT}" | sort) | wc -l)
            CHANGED=$(( TOTAL - REUSED ))
          else
            REUSED=0
            CHANGED=${TOTAL}
          fi
          echo "${CURRENT}" > "${HISTORY}"
          echo "### Layer reuse: ${{ matrix.app }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total  | ${TOTAL}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Reused | ${REUSED}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Changed| ${CHANGED} |" >> $GITHUB_STEP_SUMMARY

      - name: Save layer history cache
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/layer-history.txt
          key: layer-history-${{ matrix.app }}-${{ matrix.arch }}-${{ github.run_id }}

      - name: Push to ghcr.io with zstd:chunked
        id: push
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          ARCH="${{ matrix.arch }}"
          case "${ARCH}" in
            x86_64)  OCI_ARCH="amd64" ;;
            aarch64) OCI_ARCH="arm64" ;;
            *)       echo "ERROR: unknown arch ${ARCH}" >&2; exit 1 ;;
          esac
          STAGING_TAG="sha-${{ github.sha }}-${OCI_ARCH}"
          TARGET="ghcr.io/${{ github.repository }}/${{ matrix.app }}:${STAGING_TAG}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          podman push \
            --compression-format=zstd:chunked \
            --digestfile /tmp/digest.txt \
            "${CHUNKED}" "docker://${TARGET}"
          DIGEST=$(cat /tmp/digest.txt)
          echo "STAGING_TAG=${STAGING_TAG}" >> "$GITHUB_ENV"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "${STAGING_TAG}" > /tmp/staging-tag.txt
          echo "==> Pushed staging tag ${TARGET} @ ${DIGEST} — layers: ${LAYER_COUNT}"

      - name: Install cosign
        if: steps.arch-check.outputs.skip != 'true'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Log in to ghcr.io for cosign
        if: steps.arch-check.outputs.skip != 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with cosign
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}

      - name: Generate SBOM
        if: steps.arch-check.outputs.skip != 'true'
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}
          format: spdx-json
          output-file: sbom-${{ matrix.app }}.spdx.json
          artifact-name: sbom-${{ matrix.app }}-${{ matrix.arch }}

      - name: Attest SBOM to registry
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.app }}.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}

      - name: Verify cosign signature
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign verify \
            --certificate-identity-regexp='^https://github\.com/${{ github.repository }}/\.github/workflows/build\.yml@refs/heads/' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }}

      - name: Verify SBOM attestation
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          set -o pipefail
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp='^https://github\.com/${{ github.repository }}/\.github/workflows/build\.yml@refs/heads/' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}/${{ matrix.app }}@${{ env.DIGEST }} \
            | jq '.payload | @base64d | fromjson | .predicateType'

      - name: Login to ghcr.io for skopeo inspect
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          # skopeo does not inherit podman's login session — explicit login required
          # Must run before any skopeo inspect step (including Verify image index shape)
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Verify labels on ghcr.io
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          skopeo inspect \
            "docker://ghcr.io/${{ github.repository }}/${{ matrix.app }}:${STAGING_TAG}" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          labels = d.get('Labels', {})
          for k in ['org.flatpak.ref', 'org.flatpak.metadata', 'org.opencontainers.image.created']:
              s = 'OK' if k in labels else 'MISSING'
              print(f'{s}: {k}')
              if s == 'MISSING': sys.exit(1)
          print('All required labels present.')
          "

      - name: Verify all layers are zstd:chunked
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          RESULTS=$(skopeo inspect --raw \
            "docker://ghcr.io/${{ github.repository }}/${{ matrix.app }}:${STAGING_TAG}" \
            | jq -r '.layers[] | "Layer \(.digest[:19]): chunked=\((.annotations // {}) | has("io.github.containers.zstd-chunked.manifest-checksum"))"')
          echo "${RESULTS}"
          echo "${RESULTS}" | grep -q "chunked=false" \
            && { echo "ERROR: one or more layers missing zstd:chunked annotation" >&2; exit 1; } \
            || echo "==> All ${LAYER_COUNT} layers are zstd:chunked"

      - name: Upload digest artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/digest.txt
          retention-days: 1

      - name: Upload staging tag artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staging-tag-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/staging-tag.txt
          retention-days: 1

  # ── Merge per-arch digests into a single OCI image index ─────────────────
  publish-manifest-list:
    needs: [diff-changed-apps, sign-and-push]
    if: |
      needs.diff-changed-apps.outputs.apps != '[]' &&
      needs.diff-changed-apps.outputs.apps != '' &&
      github.event_name != 'pull_request' &&
      !cancelled()
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download per-arch digest artifacts
        run: |
          # Download digest artifacts for each arch — skip if not present (arch not supported).
          for ARCH in x86_64 aarch64; do
            ARTIFACT="digest-${{ matrix.app }}-${ARCH}"
            mkdir -p "/tmp/digests/${ARCH}"
            if gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                --jq ".artifacts[] | select(.name == \"${ARTIFACT}\") | .id" \
                | grep -q .; then
              gh run download "${{ github.run_id }}" \
                --name "${ARTIFACT}" \
                --dir "/tmp/digests/${ARCH}" 2>/dev/null || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version and OCI metadata
        id: version
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            VERSION=$(yq '.version // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${VERSION}" && "${VERSION}" != "null" ]] && echo "version=${VERSION}" >> "$GITHUB_OUTPUT" || true
            TITLE=$(yq '.title // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${TITLE}" && "${TITLE}" != "null" ]] && echo "title=${TITLE}" >> "$GITHUB_OUTPUT" || true
            DESC=$(yq '.description // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${DESC}" && "${DESC}" != "null" ]] && echo "description=${DESC}" >> "$GITHUB_OUTPUT" || true
            LICENSE=$(yq '.license // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${LICENSE}" && "${LICENSE}" != "null" ]] && echo "license=${LICENSE}" >> "$GITHUB_OUTPUT" || true
            URL=$(yq '.url // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            [[ -n "${URL}" && "${URL}" != "null" ]] && echo "source=${URL}" >> "$GITHUB_OUTPUT" || true
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            VERSION=$(yq '.["x-version"] // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            [[ -n "${VERSION}" && "${VERSION}" != "null" ]] && echo "version=${VERSION}" >> "$GITHUB_OUTPUT" || true
            TITLE=$(yq '.["x-title"] // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            [[ -n "${TITLE}" && "${TITLE}" != "null" ]] && echo "title=${TITLE}" >> "$GITHUB_OUTPUT" || true
            DESC=$(yq '.["x-description"] // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            [[ -n "${DESC}" && "${DESC}" != "null" ]] && echo "description=${DESC}" >> "$GITHUB_OUTPUT" || true
          fi

      - name: Install oras
        run: |
          ORAS_VERSION="1.3.1"
          curl -sSLf "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin oras
          oras version

      - name: Build and push OCI image indexes
        run: |
          APP="${{ matrix.app }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"

          echo "${{ secrets.GITHUB_TOKEN }}" | \
            oras login ghcr.io -u "${OWNER}" --password-stdin

          # Collect per-arch digests that were actually built and pushed.
          declare -A ARCH_DIGESTS
          for ARCH in x86_64 aarch64; do
            DIGEST_FILE="/tmp/digests/${ARCH}/digest.txt"
            if [[ -f "${DIGEST_FILE}" ]]; then
              DIGEST=$(cat "${DIGEST_FILE}")
              [[ -n "${DIGEST}" ]] && ARCH_DIGESTS[${ARCH}]="${DIGEST}"
            fi
          done

          if [[ "${#ARCH_DIGESTS[@]}" -eq 0 ]]; then
            echo "ERROR: no per-arch digests found for ${APP}" >&2
            exit 1
          fi

          # Build OCI annotation flags (index-level; GitHub UI reads these).
          CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          INDEX_ANNOTATIONS=(
            --annotation "org.opencontainers.image.created=${CREATED}"
            --annotation "org.opencontainers.image.revision=${{ github.sha }}"
            --annotation "org.opencontainers.image.vendor=${{ github.repository_owner }}"
            --annotation "org.opencontainers.image.url=https://github.com/${REPO}"
          )
          [[ -n "${{ steps.version.outputs.version }}" ]] && \
            INDEX_ANNOTATIONS+=(--annotation "org.opencontainers.image.version=${{ steps.version.outputs.version }}")
          [[ -n "${{ steps.version.outputs.title }}" ]] && \
            INDEX_ANNOTATIONS+=(--annotation "org.opencontainers.image.title=${{ steps.version.outputs.title }}")
          [[ -n "${{ steps.version.outputs.description }}" ]] && \
            INDEX_ANNOTATIONS+=(--annotation "org.opencontainers.image.description=${{ steps.version.outputs.description }}")
          [[ -n "${{ steps.version.outputs.license }}" ]] && \
            INDEX_ANNOTATIONS+=(--annotation "org.opencontainers.image.licenses=${{ steps.version.outputs.license }}")
          [[ -n "${{ steps.version.outputs.source }}" ]] && \
            INDEX_ANNOTATIONS+=(--annotation "org.opencontainers.image.source=${{ steps.version.outputs.source }}")

          # Collect source digests for oras.
          # oras manifest index create resolves digests relative to the same
          # repository as the target, so pass bare sha256:... references.
          DIGEST_ARGS=()
          for ARCH in "${!ARCH_DIGESTS[@]}"; do
            DIGEST_ARGS+=("${ARCH_DIGESTS[${ARCH}]}")
          done

          # Create and push OCI image index :latest with index-level annotations.
          # oras manifest index create supports --annotation natively (unlike
          # podman manifest annotate --index which requires podman 5+).
          oras manifest index create \
            "${INDEX_ANNOTATIONS[@]}" \
            "ghcr.io/${REPO}/${APP}:latest" \
            "${DIGEST_ARGS[@]}"
          echo "==> Pushed ghcr.io/${REPO}/${APP}:latest (${#ARCH_DIGESTS[@]} platform(s))"

          # Push version tag for bundle-repack apps.
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -n "${VERSION}" ]]; then
            oras manifest index create \
              "${INDEX_ANNOTATIONS[@]}" \
              "ghcr.io/${REPO}/${APP}:${VERSION}" \
              "${DIGEST_ARGS[@]}"
            echo "==> Pushed ghcr.io/${REPO}/${APP}:${VERSION} (${#ARCH_DIGESTS[@]} platform(s))"
          fi

      - name: Verify image index shape
        run: |
          APP="${{ matrix.app }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${OWNER}" --password-stdin
          RAW=$(skopeo inspect --raw "docker://ghcr.io/${REPO}/${APP}:latest")
          MEDIA_TYPE=$(echo "${RAW}" | jq -r '.mediaType')
          [[ "${MEDIA_TYPE}" == "application/vnd.oci.image.index.v1+json" ]] \
            || { echo "ERROR: expected OCI index, got ${MEDIA_TYPE}" >&2; exit 1; }
          COUNT=$(echo "${RAW}" | jq '.manifests | length')
          [[ "${COUNT}" -ge 1 ]] \
            && echo "==> latest index has ${COUNT} platform(s) [${MEDIA_TYPE}]" \
            || { echo "ERROR: latest is not an image index" >&2; exit 1; }
          echo "${RAW}" | jq -e '.annotations["org.opencontainers.image.created"] // error("MISSING index annotation: created")' > /dev/null \
            && echo "==> Index annotation org.opencontainers.image.created: OK"

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Log in to ghcr.io for cosign
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign OCI image index with cosign
        run: |
          APP="${{ matrix.app }}"
          REPO="${{ github.repository }}"
          # Sign :latest index (resolves to OCI image index digest)
          cosign sign --yes \
            --recursive \
            "ghcr.io/${REPO}/${APP}:latest"
          echo "==> Signed ghcr.io/${REPO}/${APP}:latest"
          # Sign version tag if present (bundle-repack apps)
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -n "${VERSION}" ]]; then
            cosign sign --yes \
              --recursive \
              "ghcr.io/${REPO}/${APP}:${VERSION}"
            echo "==> Signed ghcr.io/${REPO}/${APP}:${VERSION}"
          fi

  # ── Set package description ───────────────────────────────────────────────
  # Runs after push completes.
  # update-index is handled by the separate update-index.yml workflow
  # (triggered via workflow_run on build completion) to serialise gh-pages
  # pushes across concurrent app builds and avoid git conflicts on gh-pages.
  #
  # NOTE: Staging tags (sha-<sha>-<arch>) are intentionally NOT deleted.
  # ghcr.io permanently deletes manifest blobs when a version is deleted —
  # skopeo copy within the same registry creates only a tag alias, not an
  # independent copy. Deleting the staging tag version kills the content
  # manifest that the OCI image index references by digest, breaking
  # flatpak install with "manifest unknown". Staging tags accumulate (one
  # per build per arch) and are cleaned up manually via the cleanup.yml
  # workflow when needed.
  annotate-packages:
    needs: [diff-changed-apps, sign-and-push, publish-manifest-list]
    if: |
      needs.diff-changed-apps.outputs.apps != '[]' &&
      needs.diff-changed-apps.outputs.apps != '' &&
      github.event_name != 'pull_request' &&
      !cancelled()
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set package description
        run: |
          APP="${{ matrix.app }}"
          REPO_NAME="${{ github.event.repository.name }}"
          DESC_FILE="flatpaks/${APP}/release.yaml"
          if [[ -f "${DESC_FILE}" ]]; then
            DESCRIPTION=$(yq '.description' "${DESC_FILE}")
            [[ "${DESCRIPTION}" != "null" && -n "${DESCRIPTION}" ]] || { echo "==> No description in release.yaml, skipping"; exit 0; }
            # Package name under owner is "reponame/appname" — URL-encode the slash.
            # Note: PATCH /user/packages/container/<name> returns 404 for user-scoped packages
            # (same limitation as visibility — web UI only). Best-effort, non-fatal.
            ENCODED_NAME="${REPO_NAME}%2F${APP}"
            if gh api --method PATCH "/user/packages/container/${ENCODED_NAME}" \
                -f description="${DESCRIPTION}" 2>/dev/null; then
              echo "==> Set package description: ${DESCRIPTION}"
            else
              echo "==> WARNING: Could not set package description via API (known GitHub limitation — set manually in web UI)"
            fi
          else
            echo "==> No release.yaml for ${APP}, skipping package description"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Install test ─────────────────────────────────────────────────────────────
  # Runs after merge-index so the :latest OCI index is live on ghcr.io.
  # Tests each built app: adds the testhub Flatpak remote, installs at system
  # level, runs a launch check, then uninstalls.
  #
  # Only runs on push/merge_group/workflow_dispatch — same guard as push/merge-index.
  # Matrix is scoped to apps detected in this run (not hardcoded), with the same
  # arch-exclusion logic used by build and push.
  #
  # Launch check: `timeout 5 flatpak run <app-id>`
  #   exit 0   → app ran and exited cleanly         → PASS
  #   exit 124 → app launched but didn't self-exit  → PASS (headless GUI apps)
  #   other    → launch failed                      → FAIL
  #
  # update-index.yml is triggered by workflow_run on this workflow completing
  # successfully — so install-test is an implicit gate: the index only updates
  # if install-test passes.
  e2e-install:
    needs: [diff-changed-apps, publish-manifest-list]
    if: |
      needs.diff-changed-apps.outputs.apps != '[]' &&
      needs.diff-changed-apps.outputs.apps != '' &&
      github.event_name != 'pull_request' &&
      !cancelled()
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: read
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yq
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          wget "https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_${ARCH}" \
            -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq

      - name: Check arch support
        id: arch-check
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            ARCHES=$(yq '.arches // ""' "flatpaks/${{ matrix.app }}/release.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} on ${{ matrix.arch }} (not in arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            ARCHES=$(yq '.x-arches // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ -n "${ARCHES}" && "${ARCHES}" != "null" ]]; then
              if ! echo "${ARCHES}" | grep -q "${{ matrix.arch }}"; then
                echo "==> Skipping ${{ matrix.app }} on ${{ matrix.arch }} (not in x-arches: ${ARCHES})"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            fi
            DISABLED=$(yq '.["x-disabled"] // ""' "flatpaks/${{ matrix.app }}/manifest.yaml")
            if [[ "${DISABLED}" == "true" ]]; then
              echo "==> Skipping ${{ matrix.app }} install-test (x-disabled: true)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Read app-id from manifest
        id: app-meta
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            APP_ID=$(python3 -c "import yaml,sys; d=yaml.safe_load(open(sys.argv[1])); print(d['app-id'])" \
              "flatpaks/${{ matrix.app }}/release.yaml")
          else
            APP_ID=$(python3 -c "import yaml,sys; d=yaml.safe_load(open(sys.argv[1])); print(d['app-id'])" \
              "flatpaks/${{ matrix.app }}/manifest.yaml")
          fi
          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"

      - name: Add testhub remote
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          flatpak remote-add --system --if-not-exists testhub \
            oci+https://projectbluefin.github.io/testhub

      - name: Ensure machine-id and system D-Bus exist
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          mkdir -p /var/lib/dbus && dbus-uuidgen | tee /var/lib/dbus/machine-id
          # gnome-49 container dbus config uses /app prefix for the socket path
          mkdir -p /app/var/run/dbus
          # Create messagebus user/group required by dbus-daemon --system if missing.
          # gnome-49 container lacks useradd/adduser; write /etc/passwd and /etc/group directly.
          grep -q '^messagebus:' /etc/group  || echo 'messagebus:x:111:'         >> /etc/group
          grep -q '^messagebus:' /etc/passwd || echo 'messagebus:x:111:111::/:/sbin/nologin' >> /etc/passwd
          dbus-daemon --system --fork
          # Start a session bus so flatpak install does not try to autolaunch one.
          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS}" >> "$GITHUB_ENV"

      - name: Install ${{ matrix.app }}
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          flatpak install --system --noninteractive testhub \
            "${{ steps.app-meta.outputs.app_id }}"

      - name: Launch check ${{ matrix.app }}
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          APP_ID="${{ steps.app-meta.outputs.app_id }}"
          MANIFEST=""
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            MANIFEST="flatpaks/${{ matrix.app }}/release.yaml"
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            MANIFEST="flatpaks/${{ matrix.app }}/manifest.yaml"
          fi
          # Check for x-skip-launch-check (headless-incompatible apps, e.g. Electron GUI)
          if [[ -n "${MANIFEST}" ]]; then
            SKIP=$(yq -r '.["x-skip-launch-check"] // "false"' "${MANIFEST}")
            if [[ "${SKIP}" == "true" ]]; then
              echo "==> SKIP: launch check skipped for ${APP_ID} (x-skip-launch-check: true)"
              exit 0
            fi
          fi
          # Read optional per-app launch args
          LAUNCH_ARGS=""
          if [[ -n "${MANIFEST}" ]]; then
            LAUNCH_ARGS=$(yq -r '(.["x-launch-check"] // []) | join(" ")' "${MANIFEST}")
          fi
          set +e
          # shellcheck disable=SC2086
          timeout 5 flatpak run "${APP_ID}" ${LAUNCH_ARGS}
          EXIT=$?
          set -e
          if [[ "${EXIT}" -eq 0 ]]; then
            echo "==> PASS: ${APP_ID} ran and exited cleanly (exit 0)"
          elif [[ "${EXIT}" -eq 124 ]]; then
            echo "==> PASS: ${APP_ID} launched successfully (exit 124 — timed out, app did not self-exit)"
          else
            echo "ERROR: ${APP_ID} launch failed (exit ${EXIT})" >&2
            exit 1
          fi

      - name: Uninstall ${{ matrix.app }}
        if: always() && steps.arch-check.outputs.skip != 'true'
        run: |
          flatpak uninstall --system --noninteractive \
            "${{ steps.app-meta.outputs.app_id }}" || true
