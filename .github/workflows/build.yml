# CI environment reference
# ─────────────────────────────────────────────────────────────────────────────
# compile-oci and e2e-install run INSIDE gnome-49 container:
#   ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
#   Has: flatpak-builder, yq (after install-tools-yq), python3, ostree,
#        buildah, flatpak-builder-lint, flatpak, skopeo, just (after install)
#
# sign-and-push, publish-manifest-list, annotate-packages run on BARE ubuntu-24.04:
#   Has: podman+buildah (via Homebrew/install-tools-podman), cosign (via action),
#        podman (via brew/install-tools-podman), skopeo, gh, just
#
# Justfile is the single source of truth for all inline shell logic.
# CI-only concerns kept in YAML: staging tags, layer cache (actions/cache),
# STEP_SUMMARY, SBOM (anchore/sbom-action), attestation, cosign sign/verify,
# digest artifact upload/download (uses github.run_id + GITHUB_TOKEN).
# ─────────────────────────────────────────────────────────────────────────────
name: Build → Sign → Publish Flatpak OCI
run-name: "[${{ github.ref_name }}] ${{ inputs.app || 'all apps' }}: build → sign → publish"

on:
  push:
    paths:
      - 'flatpaks/**'
    branches: [main]
  pull_request:
    paths:
      - 'flatpaks/**'
  merge_group:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build (directory name under flatpaks/)'
        required: false
        default: ''

concurrency:
  # Scope cancellation to the same package on the same ref.
  # workflow_dispatch with app=X: cancels a prior in-progress run for the same app.
  # push: uses github.sha so each commit is independent — no cross-package cancellation
  # (the triggered app isn't known at workflow level for push events).
  group: build-${{ github.ref }}-${{ inputs.app || github.sha }}
  cancel-in-progress: true

# Top-level: deny all. Each job declares only what it needs.
permissions: {}

jobs:

  # ── Detect which apps changed ──────────────────────────────────────────────
  diff-changed-apps:
    runs-on: ubuntu-24.04
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: detect
        run: |
          if [[ -n "${{ inputs.app }}" ]]; then
            echo 'apps=["${{ inputs.app }}"]' >> "$GITHUB_OUTPUT"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            APPS=$(git diff --name-only HEAD~1 HEAD -- 'flatpaks/' \
              | cut -d/ -f2 | sort -u \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          else
            # First commit or shallow clone — treat all flatpak dirs as changed
            APPS=$(ls -d flatpaks/*/ 2>/dev/null \
              | xargs -I{} basename {} \
              | jq -Rnc '[inputs | select(length > 0)]')
            echo "apps=${APPS}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build flatpak inside gnome-49 container ────────────────────────────────
  compile-oci:
    needs: diff-changed-apps
    if: needs.diff-changed-apps.outputs.apps != '[]' && needs.diff-changed-apps.outputs.apps != ''
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    # SOURCE_DATE_EPOCH=0: normalises tar timestamps so OCI blob hashes are deterministic
    # across identical-content builds. build-bundle reads this env directly.
    env:
      SOURCE_DATE_EPOCH: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yq
        run: just install-tools-yq

      - name: Detect build path and arch support
        id: detect-path
        run: |
          if [[ -f "flatpaks/${{ matrix.app }}/release.yaml" ]]; then
            echo "mode=bundle-repack" >> "$GITHUB_OUTPUT"
          elif [[ -f "flatpaks/${{ matrix.app }}/manifest.yaml" ]]; then
            echo "mode=flatpak-builder" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: no manifest.yaml or release.yaml in flatpaks/${{ matrix.app }}/" >&2
            exit 1
          fi
          SKIP=$(just _skip-arch "${{ matrix.app }}" "${{ matrix.arch }}")
          echo "skip=${SKIP}" >> "$GITHUB_OUTPUT"

      # ── flatpak-builder path (e.g. ghostty) ──────────────────────────────
      # The v6 action:
      #   - runs flatpak-builder with --ccache --disable-rofiles-fuse --force-clean
      #   - caches .flatpak-builder/ via actions/cache
      #   - cache key: flatpak-builder-${arch}-${manifestHash:0:20}
      #   - fallback restore key: flatpak-builder-${arch}  (ccache reuse on manifest change)
      #   - writes OSTree repo to ./repo  (hardcoded localRepoName — NOT .ostree-repo)
      #   - build-bundle: false → skips bundle step; we export OCI ourselves
      #   - upload-artifact: false → we upload ourselves (correct artifact name per arch)
      - name: Read manifest branch (flatpak-builder path)
        id: manifest-meta
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          BRANCH=$(python3 -c "import yaml,sys; d=yaml.safe_load(open(sys.argv[1])); print(d.get('default-branch','stable'))" "flatpaks/${{ matrix.app }}/manifest.yaml")
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Validate metainfo XML
        if: steps.detect-path.outputs.skip != 'true'
        run: |
          METAINFO=$(find flatpaks/${{ matrix.app }} -name "*.metainfo.xml" | head -1)
          if [ -n "${METAINFO}" ]; then
            echo "==> Validating ${METAINFO}"
            appstreamcli validate --no-net "${METAINFO}" || true
          else
            echo "==> No metainfo XML found for ${{ matrix.app }} — skipping validation"
          fi

      - name: Lint Flatpak manifest
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          # flatpak-builder-lint is available directly in the gnome-49 container at /app/bin/flatpak-builder-lint
          # Runs before the build to catch manifest issues early. Fails the job on errors.
          EXCEPTIONS_FILE="flatpaks/${{ matrix.app }}/exceptions.json"
          if [ -f "${EXCEPTIONS_FILE}" ]; then
            flatpak-builder-lint --exceptions --user-exceptions "${EXCEPTIONS_FILE}" manifest "flatpaks/${{ matrix.app }}/manifest.yaml"
          else
            flatpak-builder-lint manifest "flatpaks/${{ matrix.app }}/manifest.yaml"
          fi

      - name: Build with flatpak-builder (cached)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        uses: flatpak/flatpak-github-actions/flatpak-builder@92ae9851ad316786193b1fd3f40c4b51eb5cb101 # v6
        with:
          manifest-path: flatpaks/${{ matrix.app }}/manifest.yaml
          arch: ${{ matrix.arch }}
          build-bundle: false
          upload-artifact: false
          cache: true
          cache-key: flatpak-${{ matrix.app }}-${{ matrix.arch }}-${{ hashFiles(format('flatpaks/{0}/manifest.yaml', matrix.app)) }}
          branch: ${{ steps.manifest-meta.outputs.branch }}

      - name: Lint build directory (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          # flatpak-builder-lint builddir checks the build staging dir after build but before
          # OSTree export: appstream catalog present, desktop file valid, icon installed, ELF arch.
          # build-dir defaults to flatpak_app (flatpak/flatpak-github-actions v6 default).
          EXCEPTIONS_FILE="flatpaks/${{ matrix.app }}/exceptions.json"
          if [ -f "${EXCEPTIONS_FILE}" ]; then
            flatpak-builder-lint --exceptions --user-exceptions "${EXCEPTIONS_FILE}" builddir flatpak_app
          else
            flatpak-builder-lint builddir flatpak_app
          fi

      - name: Lint OSTree repo (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          # flatpak-builder-lint repo checks the exported OSTree repository: ref shape, appstream
          # catalog in OSTree, screenshot mirroring. repo-dir defaults to repo (v6 default).
          EXCEPTIONS_FILE="flatpaks/${{ matrix.app }}/exceptions.json"
          if [ -f "${EXCEPTIONS_FILE}" ]; then
            flatpak-builder-lint --exceptions --user-exceptions "${EXCEPTIONS_FILE}" repo repo
          else
            flatpak-builder-lint repo repo
          fi

      - name: Export OCI bundle (flatpak-builder path)
        if: steps.detect-path.outputs.mode == 'flatpak-builder' && steps.detect-path.outputs.skip != 'true'
        run: |
          APP_ID=$(just metadata "${{ matrix.app }}" app-id)
          [[ -n "${APP_ID}" && "${APP_ID}" != "null" ]] || { echo "ERROR: could not determine app-id" >&2; exit 1; }
          BRANCH="${{ steps.manifest-meta.outputs.branch }}"
          echo "==> Exporting OCI for ${APP_ID} (arch: ${{ matrix.arch }}, branch: ${BRANCH})"
          flatpak build-bundle --oci --arch="${{ matrix.arch }}" repo "${{ matrix.app }}.oci" "${APP_ID}" "${BRANCH}"

      # ── Bundle repack path (e.g. goose) ──────────────────────────────────
      # Downloads upstream .flatpak, verifies sha256, imports into OSTree, exports OCI.
      # No flatpak-builder invocation — upstream build is trusted as-is.
      - name: Repack upstream bundle (bundle-repack path)
        if: steps.detect-path.outputs.mode == 'bundle-repack' && steps.detect-path.outputs.skip != 'true'
        run: |
          # _repack writes to .APP.oci; symlink to APP.oci for upload-artifact compatibility
          OCI_DIR=$(just _repack "${{ matrix.app }}" "${{ matrix.arch }}")
          [[ "${OCI_DIR}" == "SKIP" ]] && { echo "==> SKIP: arch not supported"; exit 0; }
          ln -sfn "${OCI_DIR}" "${{ matrix.app }}.oci"

      - name: Upload OCI artifact
        if: steps.detect-path.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci/
          retention-days: 1

      - name: File issue on build failure
        if: failure() && steps.detect-path.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          APP="${{ matrix.app }}"
          BRANCH="raptor/runtime-${APP}"
          TITLE="Build failure: ${APP} (${{ matrix.arch }})"

          # Find the open runtime-update issue for this app (if any)
          RUNTIME_ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "runtime-update: ${APP}" \
            --json number,title \
            --jq "[.[] | select(.title | startswith(\"runtime-update: ${APP}\"))] | .[0].number // \"\"")
          if [[ -n "${RUNTIME_ISSUE}" ]]; then
            RUNTIME_LINK="**Runtime-update issue:** #${RUNTIME_ISSUE}"
          else
            RUNTIME_LINK=""
          fi

          # Determine the source branch (PR builds expose head_ref; push builds expose ref)
          SOURCE_BRANCH="${HEAD_REF}"
          if [[ -z "${SOURCE_BRANCH}" ]]; then
            SOURCE_BRANCH="${{ github.ref_name }}"
          fi

          BODY="## Build failure: \`${APP}\` on \`${{ matrix.arch }}\`

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** \`${{ github.event_name }}\` on branch \`${SOURCE_BRANCH}\`
          ${RUNTIME_LINK}

          The \`compile-oci\` job failed for this app/arch combination.
          Check the run link above for the full log output.

          ## Fixing agent instructions

          **Target branch:** \`${BRANCH}\`

          If a PR for this branch already exists, push your fix commits directly to \`${BRANCH}\`.
          Do NOT open a new PR — one PR per app, always.

          If no PR exists yet, create one from \`${BRANCH}\` → \`main\`.

          ## Checklist for the fixing agent

          - [ ] Read the full build log and identify the root cause
          - [ ] Fix the issue (missing patch file, bad manifest field, lint exception, etc.)
          - [ ] Commit fix to branch \`${BRANCH}\` (push to existing PR, or open a new one if none exists)
          - [ ] If the fix reveals an app-specific quirk (e.g. local patch files, finish-args oddities, appstream gaps), document it in \`skills/app-gotchas.md\` under a \`### ${APP}\` heading — commit to same branch
          - [ ] If the fix reveals a gap in the sync script or pipeline (e.g. patch files not fetched on import), update the relevant skill in \`skills/\` — commit to same branch
          - [ ] Add any new lint exceptions to \`flatpaks/${APP}/exceptions.json\`
          - [ ] Close this issue once the fix is merged and the build passes"

          # Avoid duplicate issues: check if an open issue with the same title exists
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "\"${TITLE}\"" \
            --json number \
            --jq '.[0].number // ""')
          if [[ -n "${EXISTING}" ]]; then
            echo "==> Open issue #${EXISTING} already exists for this failure — skipping"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "${TITLE}" \
              --body "${BODY}" \
              --label "build-failure"
            echo "==> Filed new issue: ${TITLE}"
          fi

  # ── Build gate (required check for merge queue) ───────────────────────────
  build-complete:
    needs: [diff-changed-apps, compile-oci]
    if: always() && needs.diff-changed-apps.outputs.apps != '[]' && needs.diff-changed-apps.outputs.apps != ''
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.compile-oci.result }}" != "success" ]]; then
            echo "ERROR: build matrix did not fully succeed (result: ${{ needs.compile-oci.result }})" >&2
            exit 1
          fi
          echo "==> All build jobs passed"

  # ── Push OCI to ghcr.io with zstd:chunked ─────────────────────────────────
  sign-and-push:
    needs: [diff-changed-apps, compile-oci]
    if: needs.diff-changed-apps.outputs.apps != '[]' && needs.diff-changed-apps.outputs.apps != '' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install just
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')
          curl -fsSL "https://github.com/casey/just/releases/download/1.40.0/just-1.40.0-${ARCH}-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin just

      - name: Install podman 5.x via Homebrew
        run: just install-tools-podman

      - name: Enable user namespaces for rootless podman
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Set APP_LOWER env
        run: echo "APP_LOWER=$(echo '${{ matrix.app }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Check arch support
        id: arch-check
        run: echo "skip=$(just _skip-arch '${{ matrix.app }}' '${{ matrix.arch }}')" >> "$GITHUB_OUTPUT"

      - name: Read release metadata
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          VERSION=$(just metadata '${{ matrix.app }}' version 2>/dev/null || echo "")
          [[ "${VERSION}" == "null" ]] && VERSION=""
          [[ -n "${VERSION}" ]] && echo "VERSION=${VERSION}" >> "$GITHUB_ENV" \
            && echo "==> VERSION=${VERSION}" \
            || echo "==> No version — only :latest will be pushed"
          URL=$(just metadata '${{ matrix.app }}' url 2>/dev/null || echo "")
          [[ "${URL}" == "null" ]] && URL=""
          [[ -n "${URL}" ]] && echo "UPSTREAM_URL=${URL}" >> "$GITHUB_ENV" || true

      - name: Download OCI artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: oci-${{ matrix.app }}-${{ matrix.arch }}
          path: ${{ matrix.app }}.oci

      - name: Restore layer history cache
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/layer-history.txt
          key: layer-history-${{ matrix.app }}-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: layer-history-${{ matrix.app }}-${{ matrix.arch }}-

      - name: Split layers with chunkah
        if: steps.arch-check.outputs.skip != 'true'
        env:
          APP: ${{ matrix.app }}
        run: |
          # podman requires repository names to be lowercase; app-ids may contain uppercase
          APP_LOWER="${APP,,}"
          INPUT="localhost/${APP_LOWER}:input"
          LABELED="localhost/${APP_LOWER}:labeled"
          CHUNKED="localhost/${APP_LOWER}:chunked"

          # Pull OCI dir into the shared podman/buildah store and tag for stable reference.
          IMAGE_ID=$(podman pull --quiet "oci:./${APP}.oci")
          podman tag "${IMAGE_ID}" "${INPUT}"

          LABELED=$(just _apply-oci-labels "${IMAGE_ID}" "${VERSION:-}" "${UPSTREAM_URL:-}" "flatpaks/${APP}/release.yaml")
          echo "==> OCI labels applied: ${LABELED}"

          # Per-app max-layers tuning; defaults to 16
          MAX_LAYERS=$(just metadata "${APP}" chunkah-max-layers 2>/dev/null || echo "16")
          [[ -z "${MAX_LAYERS}" || "${MAX_LAYERS}" == "null" ]] && MAX_LAYERS="16"
          echo "==> MAX_LAYERS=${MAX_LAYERS}"

          # Per-app chunkah skip: skip-chunkah: true bypasses chunkah entirely
          SKIP_CHUNKAH=$(just metadata "${APP}" skip-chunkah 2>/dev/null || echo "false")
          [[ -z "${SKIP_CHUNKAH}" || "${SKIP_CHUNKAH}" == "null" ]] && SKIP_CHUNKAH="false"

          if [[ "${SKIP_CHUNKAH}" == "true" ]]; then
            echo "==> Skipping chunkah (x-skip-chunkah: true in manifest.yaml)"
            CHUNKED="${LABELED}"
          else
            export CHUNKAH_CONFIG_STR
            CHUNKAH_CONFIG_STR=$(podman inspect "${LABELED}" | jq -c '.[0]')
            echo "==> Running chunkah"
            podman run --rm \
              --mount=type=image,src="${LABELED}",dst=/chunkah \
              -e CHUNKAH_CONFIG_STR \
              quay.io/jlebon/chunkah:v0.3.0 build \
              --max-layers "${MAX_LAYERS}" \
              > "${APP}.ociarchive"
            CHUNKED_ID=$(podman load < "${APP}.ociarchive" | grep -oP '(?<=sha256:)[a-f0-9]+' | head -1)
            podman tag "${CHUNKED_ID}" "${CHUNKED}"
            rm -f "${APP}.ociarchive"
          fi
          podman inspect "${CHUNKED}" \
            | jq -e '.[0].Config.Labels["org.flatpak.ref"] // error("MISSING: org.flatpak.ref")' \
            > /dev/null
          echo "==> Flatpak labels OK"
          LAYER_COUNT=$(podman inspect "${CHUNKED}" | jq '.[0].RootFS.Layers | length')
          echo "==> Layer count: ${LAYER_COUNT}"
          if [[ "${SKIP_CHUNKAH}" == "true" ]]; then
            echo "==> chunkah skipped (x-skip-chunkah: true) — single layer expected"
          else
            [[ "${LAYER_COUNT}" -gt 1 ]] \
              && echo "==> chunkah split succeeded" \
              || echo "==> WARNING: chunkah produced only 1 layer"
          fi
          echo "CHUNKED=${CHUNKED}" >> "$GITHUB_ENV"
          echo "LAYER_COUNT=${LAYER_COUNT}" >> "$GITHUB_ENV"

      - name: Report layer count
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          echo "### Layer count: ${{ matrix.app }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Layers | ${LAYER_COUNT} |" >> $GITHUB_STEP_SUMMARY

      - name: Layer reuse report
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          HISTORY="/tmp/layer-history.txt"
          CURRENT=$(podman inspect "${CHUNKED}" | jq -r '.[0].RootFS.Layers[]')
          TOTAL=$(echo "${CURRENT}" | wc -l)
          if [[ -f "${HISTORY}" ]]; then
            REUSED=$(comm -12 <(sort "${HISTORY}") <(echo "${CURRENT}" | sort) | wc -l)
            CHANGED=$(( TOTAL - REUSED ))
          else
            REUSED=0
            CHANGED=${TOTAL}
          fi
          echo "${CURRENT}" > "${HISTORY}"
          echo "### Layer reuse: ${{ matrix.app }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total  | ${TOTAL}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Reused | ${REUSED}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Changed| ${CHANGED} |" >> $GITHUB_STEP_SUMMARY

      - name: Save layer history cache
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/layer-history.txt
          key: layer-history-${{ matrix.app }}-${{ matrix.arch }}-${{ github.run_id }}

      - name: Push to ghcr.io with zstd:chunked
        id: push
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          ARCH="${{ matrix.arch }}"
          case "${ARCH}" in
            x86_64)  OCI_ARCH="amd64" ;;
            aarch64) OCI_ARCH="arm64" ;;
            *)       echo "ERROR: unknown arch ${ARCH}" >&2; exit 1 ;;
          esac
          STAGING_TAG="sha-${{ github.sha }}-${OCI_ARCH}"
           TARGET="ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}:${STAGING_TAG}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          podman push \
            --compression-format=zstd:chunked \
            --digestfile /tmp/digest.txt \
            "${CHUNKED}" "docker://${TARGET}"
          DIGEST=$(cat /tmp/digest.txt)
          echo "STAGING_TAG=${STAGING_TAG}" >> "$GITHUB_ENV"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "${STAGING_TAG}" > /tmp/staging-tag.txt
          echo "==> Pushed staging tag ${TARGET} @ ${DIGEST} — layers: ${LAYER_COUNT}"

      - name: Patch manifest mediaType for flatpak compatibility
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          # flatpak >= 1.16 requires top-level "mediaType" in the OCI manifest JSON blob.
          # podman push does not add it; patch post-push via registry API and update digest.
          PATCHED_DIGEST=$(just _patch-media-type \
            '${{ matrix.app }}' \
            "${DIGEST}" \
            "${STAGING_TAG}" \
            "ghcr.io" \
            "${{ github.repository_owner }}" \
            "${{ github.repository }}")
          echo "DIGEST=${PATCHED_DIGEST}" >> "$GITHUB_ENV"
          echo "${PATCHED_DIGEST}" > /tmp/digest.txt
          echo "==> Patched manifest: ${STAGING_TAG} @ ${PATCHED_DIGEST}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: steps.arch-check.outputs.skip != 'true'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Log in to ghcr.io for cosign
        if: steps.arch-check.outputs.skip != 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with cosign
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}@${{ env.DIGEST }}

      - name: Generate SBOM
        if: steps.arch-check.outputs.skip != 'true'
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}@${{ env.DIGEST }}
          format: spdx-json
          output-file: sbom-${{ matrix.app }}.spdx.json
          artifact-name: sbom-${{ matrix.app }}-${{ matrix.arch }}

      - name: Attest SBOM to registry
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.app }}.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}@${{ env.DIGEST }}

      - name: Verify cosign signature
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          cosign verify \
            --certificate-identity-regexp='^https://github\.com/${{ github.repository }}/\.github/workflows/build\.yml@refs/heads/' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}@${{ env.DIGEST }}

      - name: Verify SBOM attestation
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          set -o pipefail
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp='^https://github\.com/${{ github.repository }}/\.github/workflows/build\.yml@refs/heads/' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}@${{ env.DIGEST }} \
            | jq '.payload | @base64d | fromjson | .predicateType'

      - name: Login to ghcr.io for skopeo inspect
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Verify labels on ghcr.io
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          skopeo inspect \
            "docker://ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}:${STAGING_TAG}" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          labels = d.get('Labels', {})
          for k in ['org.flatpak.ref', 'org.flatpak.metadata', 'org.opencontainers.image.created']:
              s = 'OK' if k in labels else 'MISSING'
              print(f'{s}: {k}')
              if s == 'MISSING': sys.exit(1)
          print('All required labels present.')
          "

      - name: Verify all layers are zstd:chunked
        if: steps.arch-check.outputs.skip != 'true'
        run: |
          RESULTS=$(skopeo inspect --raw \
            "docker://ghcr.io/${{ github.repository }}/${{ env.APP_LOWER }}:${STAGING_TAG}" \
            | jq -r '.layers[] | "Layer \(.digest[:19]): chunked=\((.annotations // {}) | has("io.github.containers.zstd-chunked.manifest-checksum"))"')
          echo "${RESULTS}"
          echo "${RESULTS}" | grep -q "chunked=false" \
            && { echo "ERROR: one or more layers missing zstd:chunked annotation" >&2; exit 1; } \
            || echo "==> All ${LAYER_COUNT} layers are zstd:chunked"

      - name: Upload digest artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/digest.txt
          retention-days: 1

      - name: Upload staging tag artifact
        if: steps.arch-check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staging-tag-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/staging-tag.txt
          retention-days: 1

  # ── Merge per-arch digests into a single OCI image index ─────────────────
  publish-manifest-list:
    needs: [diff-changed-apps, sign-and-push]
    if: |
      needs.diff-changed-apps.outputs.apps != '[]' &&
      needs.diff-changed-apps.outputs.apps != '' &&
      github.event_name != 'pull_request' &&
      !cancelled()
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download per-arch digest artifacts
        run: |
          # Download digest artifacts for each arch — skip if not present (arch not supported).
          for ARCH in x86_64 aarch64; do
            ARTIFACT="digest-${{ matrix.app }}-${ARCH}"
            mkdir -p "/tmp/digests/${ARCH}"
            if gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                --jq ".artifacts[] | select(.name == \"${ARTIFACT}\") | .id" \
                | grep -q .; then
              gh run download "${{ github.run_id }}" \
                --name "${ARTIFACT}" \
                --dir "/tmp/digests/${ARCH}" 2>/dev/null || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install just
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')
          curl -fsSL "https://github.com/casey/just/releases/download/1.40.0/just-1.40.0-${ARCH}-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin just

      - name: Read version and OCI metadata
        id: version
        run: |
          VERSION=$(just metadata '${{ matrix.app }}' version 2>/dev/null || echo "")
          [[ "${VERSION}" == "null" ]] && VERSION=""
          [[ -n "${VERSION}" ]] && echo "version=${VERSION}" >> "$GITHUB_OUTPUT" || true

      - name: Install podman
        run: just install-tools-podman

      - name: Build and push OCI image indexes
        run: just push-manifest-list '${{ matrix.app }}'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image index shape
        run: |
          APP="${{ matrix.app }}"
          APP="${APP,,}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${OWNER}" --password-stdin
          RAW=$(skopeo inspect --raw "docker://ghcr.io/${REPO}/${APP}:latest")
          MEDIA_TYPE=$(echo "${RAW}" | jq -r '.mediaType')
          [[ "${MEDIA_TYPE}" == "application/vnd.oci.image.index.v1+json" ]] \
            || { echo "ERROR: expected OCI index, got ${MEDIA_TYPE}" >&2; exit 1; }
          COUNT=$(echo "${RAW}" | jq '.manifests | length')
          [[ "${COUNT}" -ge 1 ]] \
            && echo "==> latest index has ${COUNT} platform(s) [${MEDIA_TYPE}]" \
            || { echo "ERROR: latest is not an image index" >&2; exit 1; }
          # Verify each child descriptor has org.opencontainers.image.ref.name annotation.
          # Flatpak requires this to resolve refs after mirroring the index locally.
          MISSING=$(echo "${RAW}" | jq -r '
            .manifests[]
            | select((.annotations["org.opencontainers.image.ref.name"] // "") == "")
            | .digest
          ')
          if [[ -n "${MISSING}" ]]; then
            echo "ERROR: missing org.opencontainers.image.ref.name on descriptor(s): ${MISSING}" >&2
            exit 1
          fi
          echo "==> All descriptors have org.opencontainers.image.ref.name: OK"

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Log in to ghcr.io for cosign
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign OCI image index with cosign
        run: |
          APP="${{ matrix.app }}"
          APP="${APP,,}"
          REPO="${{ github.repository }}"
          # Sign :latest index (resolves to OCI image index digest)
          cosign sign --yes \
            --recursive \
            "ghcr.io/${REPO}/${APP}:latest"
          echo "==> Signed ghcr.io/${REPO}/${APP}:latest"
          # Sign version tag if present (bundle-repack apps)
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -n "${VERSION}" ]]; then
            cosign sign --yes \
              --recursive \
              "ghcr.io/${REPO}/${APP}:${VERSION}"
            echo "==> Signed ghcr.io/${REPO}/${APP}:${VERSION}"
          fi

      - name: Attest SBOMs to manifest list
        run: |
          APP="${{ matrix.app }}"
          APP="${APP,,}"
          REPO="${{ github.repository }}"
          # Resolve the manifest list digest for :latest
          INDEX_DIGEST=$(skopeo inspect --raw "docker://ghcr.io/${REPO}/${APP}:latest" \
            | sha256sum | awk '{print "sha256:" $1}')
          echo "==> Manifest list digest: ${INDEX_DIGEST}"
          # Download SBOM artifacts for each arch and attest to the manifest list
          for ARCH in x86_64 aarch64; do
            ARTIFACT="sbom-${{ matrix.app }}-${ARCH}"
            mkdir -p "/tmp/sboms/${ARCH}"
            if gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                --jq ".artifacts[] | select(.name == \"${ARTIFACT}\") | .id" \
                | grep -q .; then
              gh run download "${{ github.run_id }}" \
                --name "${ARTIFACT}" \
                --dir "/tmp/sboms/${ARCH}"
              # anchore/sbom-action uploads the file as-is; find it regardless of exact filename
              SBOM_PATH=$(find "/tmp/sboms/${ARCH}" -name "*.spdx.json" | head -1)
              if [[ -n "${SBOM_PATH}" ]]; then
                cosign attest --yes \
                  --predicate "${SBOM_PATH}" \
                  --type spdxjson \
                  "ghcr.io/${REPO}/${APP}@${INDEX_DIGEST}"
                echo "==> Attested ${ARCH} SBOM to manifest list"
              else
                echo "==> WARNING: no .spdx.json found in ${ARTIFACT} — skipping ${ARCH}"
              fi
            else
              echo "==> No SBOM artifact for ${ARCH} (arch not built) — skipping"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Set package description ───────────────────────────────────────────────
  # NOTE: Staging tags not deleted — see skills/pipeline.md "Staging tags".
  annotate-packages:
    needs: [diff-changed-apps, sign-and-push, publish-manifest-list]
    if: |
      needs.diff-changed-apps.outputs.apps != '[]' &&
      needs.diff-changed-apps.outputs.apps != '' &&
      github.event_name != 'pull_request' &&
      !cancelled()
    runs-on: ${{ matrix.runner || 'ubuntu-24.04' }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.diff-changed-apps.outputs.apps) }}
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install just
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')
          curl -fsSL "https://github.com/casey/just/releases/download/1.40.0/just-1.40.0-${ARCH}-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin just

      - name: Set package description
        run: |
          APP="${{ matrix.app }}"
          APP_LOWER="${APP,,}"
          REPO_NAME="${{ github.event.repository.name }}"
          DESCRIPTION=$(just metadata "${APP}" description 2>/dev/null || echo "")
          [[ "${DESCRIPTION}" == "null" || -z "${DESCRIPTION}" ]] && { echo "==> No description for ${APP}, skipping"; exit 0; }
          # Package name under owner is "reponame/appname" — URL-encode the slash.
          # Note: PATCH /user/packages/container/<name> returns 404 for user-scoped packages
          # (same limitation as visibility — web UI only). Best-effort, non-fatal.
          ENCODED_NAME="${REPO_NAME}%2F${APP_LOWER}"
          if gh api --method PATCH "/user/packages/container/${ENCODED_NAME}" \
              -f description="${DESCRIPTION}" 2>/dev/null; then
            echo "==> Set package description: ${DESCRIPTION}"
          else
            echo "==> WARNING: Could not set package description via API (known GitHub limitation — set manually in web UI)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Install test ─────────────────────────────────────────────────────────────
  # Moved to update-index.yml — runs AFTER gh-pages index is updated so the install
  # test always exercises the freshly-pushed image from the live index.
