name: Update goose

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for new release
        id: check
        run: |
          LATEST=$(curl -fsSL "https://api.github.com/repos/block/goose/releases/latest" \
            | jq -r '.tag_name')
          CURRENT=$(yq '.version' flatpaks/goose/release.yaml)
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [[ "${LATEST}" == "${CURRENT}" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update release.yaml
        if: steps.check.outputs.up_to_date == 'false'
        id: update
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          URL="https://github.com/block/goose/releases/download/${LATEST}/io.github.block.Goose_stable_x86_64.flatpak"
          echo "Downloading ${URL}"
          curl -fsSL -o /tmp/goose.flatpak "${URL}"
          SHA256=$(sha256sum /tmp/goose.flatpak | cut -d' ' -f1)
          echo "sha256=${SHA256}"
          yq -i ".version = \"${LATEST}\"" flatpaks/goose/release.yaml
          yq -i ".url = \"${URL}\"" flatpaks/goose/release.yaml
          yq -i ".sha256 = \"${SHA256}\"" flatpaks/goose/release.yaml
          echo "branch=update/goose-${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.update.outputs.branch }}"
          git add flatpaks/goose/release.yaml
          git commit -m "chore(goose): update to ${{ steps.check.outputs.latest }}"
          git push --force-with-lease origin "${{ steps.update.outputs.branch }}"
          gh pr create \
            --title "chore(goose): update to ${{ steps.check.outputs.latest }}" \
            --body "Automated update: goose ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}" \
            --label "automated" \
            --head "${{ steps.update.outputs.branch }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
