name: Sync Flatpak Remote Index

# Triggered after each "Build → Sign → Publish Flatpak OCI" run completes successfully.
# Running as a separate workflow serialises all gh-pages pushes — no race
# between concurrent app builds writing to the same branch.
#
# Job order enforces a per-app gate:
#   prepare → e2e-install → commit-index
#
# e2e-install uploads an e2e-passed-<app>-<arch> artifact ONLY on success.
# commit-index checks for that artifact before writing each app's index entry.
# An app whose e2e-install failed is silently skipped — its last good index
# entry is preserved. Other apps in the same build are not affected.
#
# This prevents a single broken app from blocking the index update for all apps.
# The index always reflects the last known-good state per app.
#
# commit-index re-downloads the digest artifacts from the triggering build run
# and reruns update-index.py — deterministic, no cross-job artifact needed.

on:
  workflow_run:
    workflows: ["Build → Sign → Publish Flatpak OCI"]
    types: [completed]

# Top-level: deny all. Jobs request only what they need.
permissions: {}

jobs:
  # ── Prepare: derive e2e matrix from digest artifacts ─────────────────────
  # Downloads per-arch digest artifacts from the triggering build run and
  # builds the matrix for e2e-install. Does NOT touch gh-pages.
  prepare:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' ||
       github.event.workflow_run.event == 'merge_group' ||
       github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_entries: ${{ steps.matrix.outputs.has_entries }}
    steps:
      - name: Download all digest artifacts from triggering run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digest-*
          path: /tmp/digests
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app+arch matrix from digest artifacts
        id: matrix
        run: |
          # Derive matrix from digest artifact dirs: digest-<app>-<arch>
          # Each artifact contains one arch of one app — one run-test invocation each.
          MATRIX=$(
            shopt -s nullglob
            entries=()
            for d in /tmp/digests/digest-*/; do
              dir=$(basename "$d")
              rest="${dir#digest-}"
              arch="${rest##*-}"
              app="${rest%-${arch}}"
              entries+=("{\"app\":\"${app}\",\"arch\":\"${arch}\"}")
            done
            if [[ ${#entries[@]} -eq 0 ]]; then
              echo '{"include":[]}'
            else
              joined=$(IFS=,; echo "${entries[*]}")
              echo "{\"include\":[${joined}]}"
            fi
          )
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "has_entries=$(echo "${MATRIX}" | python3 -c 'import sys,json; d=json.load(sys.stdin); print("true" if d.get("include") else "false")')" >> "$GITHUB_OUTPUT"

  # ── E2E install test ──────────────────────────────────────────────────────
  # Gate: runs BEFORE gh-pages is updated. Per-app: each matrix job uploads
  # an e2e-passed-<app>-<arch> artifact ONLY on success. commit-index checks
  # for that artifact before writing each app's index entry.
  #
  # Launch check: exit 0 = clean exit (PASS), exit 124 = timeout/headless GUI (PASS), other = FAIL
  # Apps that cannot launch headless must set x-skip-launch-check: true in their manifest.
  e2e-install:
    needs: [prepare]
    if: needs.prepare.outputs.has_entries == 'true'
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      packages: read
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yq
        run: just install-tools-yq

      - name: Install just
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')
          curl -fsSL "https://github.com/casey/just/releases/download/1.40.0/just-1.40.0-${ARCH}-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin just

      - name: Run install test
        run: |
          just run-test '${{ matrix.app }}' '${{ matrix.arch }}'
          touch /tmp/e2e-passed-marker

      - name: Upload e2e-passed artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-passed-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/e2e-passed-marker
          if-no-files-found: warn
          retention-days: 1

      - name: Uninstall on failure
        if: always()
        run: |
          APP_ID=$(just metadata '${{ matrix.app }}' app-id 2>/dev/null || echo "")
          [[ -n "${APP_ID}" ]] && flatpak uninstall --system --noninteractive "${APP_ID}" || true

  # ── Commit index to gh-pages ──────────────────────────────────────────────
  # Runs after e2e-install finishes (pass or fail — not skipped).
  # Per-app gate: only writes index entries for apps whose e2e-passed artifact exists.
  # Apps that failed e2e are skipped; their last good index entry is preserved.
  # Serialised via concurrency group to prevent races between concurrent builds.
  commit-index:
    needs: [prepare, e2e-install]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.e2e-install.result != 'skipped'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
      actions: read
    concurrency:
      group: gh-pages-update
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: main

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: gh-pages
          path: pages

      - name: Download all digest artifacts from triggering run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digest-*
          path: /tmp/digests
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all e2e-passed artifacts from this run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: e2e-passed-*
          path: /tmp/e2e-passed
        continue-on-error: true

      - name: Login to ghcr.io for skopeo inspect
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Sync gh-pages before writing
        run: |
          cd pages
          git fetch origin gh-pages && git rebase origin/gh-pages

      - name: Update index for each app and arch
        run: |
          cd pages
          shopt -s nullglob
          for DIGEST_FILE in /tmp/digests/digest-*/digest.txt; do
            DIR=$(basename "$(dirname "${DIGEST_FILE}")")
            REST="${DIR#digest-}"
            ARCH="${REST##*-}"
            APP_ORIG="${REST%-${ARCH}}"
            APP="${APP_ORIG,,}"
            DIGEST=$(cat "${DIGEST_FILE}")

            # Per-app gate: only write entry if e2e-install passed for this app+arch.
            # Artifact names preserve original case (e.g. org.altlinux.Tuner);
            # check both lowercased and original-case artifact dirs to be safe.
            if [[ ! -d "/tmp/e2e-passed/e2e-passed-${APP_ORIG}-${ARCH}" ]] && \
               [[ ! -d "/tmp/e2e-passed/e2e-passed-${APP}-${ARCH}" ]]; then
              echo "==> SKIP index update: ${APP} ${ARCH} — e2e-install did not pass"
              continue
            fi

            echo "==> Updating index: ${APP} ${ARCH} ${DIGEST}"
            python3 ../main/scripts/update-index.py \
              --app "${APP}" \
              --digest "${DIGEST}" \
              --registry ghcr.io \
              --repo "${{ github.repository }}/${APP}" \
              --tags "latest"
          done

      - name: Commit and push index
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index/static
          if git diff --cached --quiet; then
            echo "index unchanged, skipping commit"
          else
            git commit -m "chore(index): update from build ${{ github.event.workflow_run.run_number }} [skip ci]"
            git push
          fi
