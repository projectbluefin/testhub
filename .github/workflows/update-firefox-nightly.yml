name: Update firefox-nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for new build
        id: check
        run: |
          BASE_URL="https://download-installer.cdn.mozilla.net/pub/firefox/nightly/latest-mozilla-central"
          # Get filename of latest build to extract version
          FILENAME=$(curl -fsSL "${BASE_URL}/" \
            | grep -oP 'firefox-[0-9]+\.[0-9]+a[0-9]+\.en-US\.linux-x86_64\.tar\.xz' \
            | head -1)
          LATEST_VER=$(echo "${FILENAME}" | grep -oP '[0-9]+\.[0-9]+a[0-9]+')
          CURRENT=$(yq '.["x-version"]' flatpaks/firefox-nightly/manifest.yaml)
          echo "latest=${LATEST_VER}" >> "$GITHUB_OUTPUT"
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          if [[ "${LATEST_VER}" == "${CURRENT}" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest
        if: steps.check.outputs.up_to_date == 'false'
        id: update
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          BASE_URL="${{ steps.check.outputs.base_url }}"
          TARBALL="firefox-${LATEST}.en-US.linux-x86_64.tar.xz"
          CHECKSUMS_URL="${BASE_URL}/firefox-${LATEST}.en-US.linux-x86_64.checksums"
          NEW_URL="${BASE_URL}/${TARBALL}"
          # Get sha256 from checksums file (no full download needed)
          SHA256=$(curl -fsSL "${CHECKSUMS_URL}" \
            | grep "linux-x86_64.tar.xz " \
            | grep " sha256 " \
            | awk '{print $1}')
          echo "sha256=${SHA256}"
          # Update x-version
          yq -i ".\"x-version\" = \"${LATEST}\"" flatpaks/firefox-nightly/manifest.yaml
          # Update only the archive source (has only-arches field — the main tarball)
          yq -i "(.modules[].sources[] | select(.type == \"archive\") | .url) = \"${NEW_URL}\"" \
            flatpaks/firefox-nightly/manifest.yaml
          yq -i "(.modules[].sources[] | select(.type == \"archive\") | .sha256) = \"${SHA256}\"" \
            flatpaks/firefox-nightly/manifest.yaml
          echo "branch=update/firefox-nightly-${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.update.outputs.branch }}"
          git add flatpaks/firefox-nightly/manifest.yaml
          git commit -m "chore(firefox-nightly): update to ${{ steps.check.outputs.latest }}"
          git push --force-with-lease origin "${{ steps.update.outputs.branch }}"
          gh pr create \
            --title "chore(firefox-nightly): update to ${{ steps.check.outputs.latest }}" \
            --body "Automated update: Firefox Nightly ${{ steps.check.outputs.latest }}" \
            --label "automated" \
            --head "${{ steps.update.outputs.branch }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
