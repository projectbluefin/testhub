name: Update ghostty

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for new release
        id: check
        run: |
          # Find latest stable tag (vX.Y.Z — skip anything with 'tip', 'rc', 'beta', 'alpha')
          LATEST=$(curl -fsSL "https://api.github.com/repos/ghostty-org/ghostty/tags?per_page=20" \
            | jq -r '.[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          CURRENT=$(yq '.["x-version"]' flatpaks/ghostty/manifest.yaml)
          echo "latest=${LATEST#v}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [[ "${LATEST#v}" == "${CURRENT}" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update files
        if: steps.check.outputs.up_to_date == 'false'
        id: update
        run: |
          LATEST_TAG="${{ steps.check.outputs.latest_tag }}"
          LATEST="${{ steps.check.outputs.latest }}"
          URL="https://codeload.github.com/ghostty-org/ghostty/tar.gz/refs/tags/${LATEST_TAG}"
          echo "Computing sha256 for ${URL}"
          SHA256=$(curl -fsSL "${URL}" | sha256sum | cut -d' ' -f1)
          echo "sha256=${SHA256}"
          # Update manifest.yaml
          yq -i ".\"x-version\" = \"${LATEST}\"" flatpaks/ghostty/manifest.yaml
          yq -i "(.modules[] | select(.name == \"ghostty\") | .sources[] | select(.type == \"archive\") | .url) = \"${URL}\"" flatpaks/ghostty/manifest.yaml
          yq -i "(.modules[] | select(.name == \"ghostty\") | .sources[] | select(.type == \"archive\") | .sha256) = \"${SHA256}\"" flatpaks/ghostty/manifest.yaml
          # Fetch updated support files from upstream tag
          curl -fsSL "https://raw.githubusercontent.com/ghostty-org/ghostty/refs/tags/${LATEST_TAG}/flatpak/zig-packages.json" \
            > flatpaks/ghostty/zig-packages.json
          curl -fsSL "https://raw.githubusercontent.com/ghostty-org/ghostty/refs/tags/${LATEST_TAG}/flatpak/dependencies.yml" \
            > flatpaks/ghostty/dependencies.yml
          echo "branch=update/ghostty-${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.update.outputs.branch }}"
          git add flatpaks/ghostty/manifest.yaml flatpaks/ghostty/zig-packages.json flatpaks/ghostty/dependencies.yml
          git commit -m "chore(ghostty): update to ${{ steps.check.outputs.latest_tag }}"
          git push --force-with-lease origin "${{ steps.update.outputs.branch }}"
          gh pr create \
            --title "chore(ghostty): update to ${{ steps.check.outputs.latest_tag }}" \
            --body "Automated update: ghostty ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}" \
            --label "automated" \
            --head "${{ steps.update.outputs.branch }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
