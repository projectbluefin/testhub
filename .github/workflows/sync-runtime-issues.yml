name: Sync runtime-update issues from flatpak-tracker

"on":
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync-runtime-issues.py

      - name: Commit changes
        run: |
          git config user.name "raptor[bot]"
          git config user.email "noop@projectbluefin.dev"
          git add flatpaks/
          if git diff --cached --quiet; then
            echo "==> No changes to commit"
          else
            COUNT=$(git diff --cached --name-only | grep -c manifest.yaml || true)
            git commit -m "chore(flatpaks): sync ${COUNT} runtime-update app(s) from flatpak-tracker [skip ci]"
            git push
          fi
