name: Update lmstudio

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for new release
        id: check
        run: |
          # Extract latest Linux x64 deb version from lmstudio.ai/beta-releases
          LATEST_FULL=$(curl -fsSL "https://lmstudio.ai/beta-releases" \
            | grep -oP 'installers\.lmstudio\.ai/linux/x64/[0-9]+\.[0-9]+\.[0-9]+-[0-9]+/' \
            | head -1 \
            | grep -oP '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+')
          # x-version stores only the app version without the deb revision (e.g. "0.4.6" not "0.4.6-1")
          LATEST_APP=$(echo "${LATEST_FULL}" | grep -oP '^[0-9]+\.[0-9]+\.[0-9]+')
          CURRENT=$(yq '.["x-version"]' flatpaks/lmstudio/manifest.yaml)
          echo "latest_full=${LATEST_FULL}" >> "$GITHUB_OUTPUT"
          echo "latest_app=${LATEST_APP}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [[ "${LATEST_APP}" == "${CURRENT}" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest
        if: steps.check.outputs.up_to_date == 'false'
        id: update
        run: |
          LATEST_FULL="${{ steps.check.outputs.latest_full }}"
          LATEST_APP="${{ steps.check.outputs.latest_app }}"
          URL="https://installers.lmstudio.ai/linux/x64/${LATEST_FULL}/LM-Studio-${LATEST_FULL}-x64.deb"
          echo "Downloading ${URL}"
          curl -fsSL -o /tmp/lmstudio.deb "${URL}"
          SHA256=$(sha256sum /tmp/lmstudio.deb | cut -d' ' -f1)
          echo "sha256=${SHA256}"
          # Update x-version (app version only, without deb revision)
          yq -i ".\"x-version\" = \"${LATEST_APP}\"" flatpaks/lmstudio/manifest.yaml
          # Update source url and sha256 (the type: file entry)
          yq -i "(.modules[].sources[] | select(.type == \"file\") | .url) = \"${URL}\"" \
            flatpaks/lmstudio/manifest.yaml
          yq -i "(.modules[].sources[] | select(.type == \"file\") | .sha256) = \"${SHA256}\"" \
            flatpaks/lmstudio/manifest.yaml
          # Update dest-filename to match new version
          yq -i "(.modules[].sources[] | select(.type == \"file\") | .\"dest-filename\") = \"LM-Studio-${LATEST_FULL}-x64.deb\"" \
            flatpaks/lmstudio/manifest.yaml
          # Update the ar x command in build-commands to reference the new filename
          sed -i "s/ar x LM-Studio-.*-x64\.deb/ar x LM-Studio-${LATEST_FULL}-x64.deb/" \
            flatpaks/lmstudio/manifest.yaml
          echo "branch=update/lmstudio-${LATEST_APP}" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.update.outputs.branch }}"
          git add flatpaks/lmstudio/manifest.yaml
          git commit -m "chore(lmstudio): update to ${{ steps.check.outputs.latest_full }}"
          git push --force-with-lease origin "${{ steps.update.outputs.branch }}"
          gh pr create \
            --title "chore(lmstudio): update to ${{ steps.check.outputs.latest_full }}" \
            --body "Automated update: LM Studio ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest_app }}" \
            --label "automated" \
            --head "${{ steps.update.outputs.branch }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
